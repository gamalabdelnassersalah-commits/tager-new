    @media(max-width:900px){.supplier-invoice-summary,.invoice-meta-grid,.invoice-total-box{grid-template-columns:1fr 1fr}}

    .invoice-elegant-page{padding-top:16px}.elegant-invoice{max-width:1080px;margin:auto;background:linear-gradient(180deg,#ffffff,#fbfefd);border:1px solid #dfeee8;border-radius:30px;overflow:hidden}.invoice-top-strip{display:flex;justify-content:space-between;align-items:center;gap:12px;background:linear-gradient(135deg,#0b6b60,#13836f);color:#fff;padding:14px 22px}.doc-badge{font-weight:900;font-size:18px}.doc-number{font-size:16px}.elegant-head{border-bottom:1px solid #e6f1ed;padding-bottom:22px}.brand-box{display:flex;align-items:center;gap:16px}.brand-box img{height:74px;width:auto;object-fit:contain;padding:10px 14px;border-radius:20px;background:#fff;border:1px solid #deece7}.brand-box h2{margin:0 0 6px;color:#093b34;font-size:34px}.head-side{display:grid;gap:12px;min-width:220px}.head-side>div{background:#f7fcfa;border:1px solid #deece7;border-radius:18px;padding:12px 14px}.head-side span{display:block;color:#6f817b;font-size:13px;margin-bottom:5px}.head-side b{font-size:18px;color:#083b34}.elegant-meta div{background:#ffffff;border:1px solid #e4f0eb;box-shadow:none}.elegant-table table tr:first-child th{background:#f2faf7;color:#0b6b60}.elegant-table td,.elegant-table th{padding:14px 12px}.elegant-totals div{background:#fff;border:1px solid #dfeee8}.invoice-signatures{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:24px}.invoice-signatures div{border:1px dashed #bdd9cf;border-radius:18px;padding:16px 18px;background:#fcfffe}.invoice-signatures span{display:block;color:#6a7d77;margin-bottom:10px}.invoice-signatures b{color:#0b6b60;font-size:18px}.workspace-section .table-wrap{overflow:auto}.workspace-section h2{margin-bottom:8px}@media(max-width:760px){.invoice-top-strip,.invoice-signatures{grid-template-columns:1fr;display:grid}.brand-box{flex-direction:column;align-items:flex-start}.brand-box h2{font-size:28px}.head-side{min-width:0}}

<body>

  </header>

  <script>
    const EGYPT={

      'الشرقية':['الزقازيق','العاشر من رمضان','بلبيس','فاقوس','منيا القمح'],
      'الغربية':['طنطا','المحلة الكبرى','زفتى','كفر الزيات'],
      'القليوبية':['بنها','شبرا الخيمة','قليوب','الخانكة','العبور'],
      'البحيرة':['دمنهور','كفر الدوار','رشيد','إدكو'],
      'المنوفية':['شبين الكوم','قويسنا','منوف','السادات'],
      'كفر الشيخ':['كفر الشيخ','دسوق','بيلا','بلطيم'],
      'دمياط':['دمياط','رأس البر','فارسكور','كفر سعد'],
      'بورسعيد':['بورسعيد','بورفؤاد'],
      'الإسماعيلية':['الإسماعيلية','فايد','القنطرة'],
      'السويس':['السويس','عتاقة','الجناين'],
      'أسيوط':['أسيوط','ديروط','القوصية','أبو تيج'],
      'سوهاج':['سوهاج','أخميم','المنشاة','جرجا','طما'],
      'قنا':['قنا','نجع حمادي','قفط','قوص'],
      'أسوان':['أسوان','دراو','كوم أمبو','إدفو'],
      'الأقصر':['الأقصر','إسنا','أرمنت'],
      'البحر الأحمر':['الغردقة','رأس غارب','سفاجا','القصير'],
      'مرسى مطروح':['مطروح','العلمين','الحمام','سيوة'],
      'شمال سيناء':['العريش','بئر العبد','الشيخ زويد'],
      'جنوب سيناء':['شرم الشيخ','دهب','نويبع','الطور']
    };
    const CATEGORY_MASTER=[
      ['مواد غذائية','🛒','أرز، سكر، زيت، مكرونة، معلبات'],['مشروبات','🥤','مياه، عصائر، مشروبات غازية'],['ألبان ومجمدات','🥛','ألبان، جبن، زبدة، مجمدات'],['منظفات','🧼','منظفات منزلية وتجارية'],['ورقيات','🧻','مناديل ورقية ومنتجات صحية'],['عناية شخصية','🧴','منتجات عناية وجمال'],['أدوات منزلية','🍳','مطبخ ومنزل ومستلزمات'],['معدات تشغيل','🧰','أدوات ومعدات للمتاجر'],['تعبئة وتغليف','📦','عبوات، كراتين، أكياس'],['منتجات موسمية','⭐','عروض ومواسم'],['مطاعم وكافيهات','☕','مستلزمات تشغيل'],['تجارة عامة','🏬','موردون متنوعون']
    ];
    const DEFAULT_SETTINGS={platformName:'Tager', supportPhone:'+20 10 24237231', whatsapp:'+20 1127512512', email:'support@tager.com', defaultCommission:1.5, premiumBasketFee:1.5, minOrder:0, currency:'ج.م', deliveryBase:0, businessMode:'B2B', allowPremiumBasket:true};
    const stateKey='tager_preserved_platform_state';
    const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
    const uid=()=>localStorage.getItem('tager_user_id')||''; const role=()=>localStorage.getItem('tager_role')||''; const uname=()=>localStorage.getItem('tager_name')||'';
    const blank=()=>({settings:{...DEFAULT_SETTINGS},users:[],vendors:[],products:[],orders:[],tickets:[],payments:[],cart:[],areas:[],notifications:[],categories:CATEGORY_MASTER.map((c,i)=>({id:id(),name:c[0],icon:c[1],description:c[2],active:true,sort:i+1}))});
    function id(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():'id_'+Date.now()+'_'+Math.random().toString(16).slice(2)}
    function load(){try{return {...blank(),...(JSON.parse(localStorage.getItem(stateKey)||'{}'))}}catch(e){return blank()}}
    function save(s){localStorage.setItem(stateKey,JSON.stringify(s));updateCartCount()}
    function fmt(n){const s=load().settings; return `${Number(n||0).toLocaleString('ar-EG')} ${s.currency||'ج.م'}`}
    function today(){return new Date().toLocaleDateString('ar-EG')}
    function setSession(u){localStorage.setItem('tager_user_id',u.id);localStorage.setItem('tager_role',u.role);localStorage.setItem('tager_name',u.name||u.storeName||'حسابي')}
    function logout(){localStorage.removeItem('tager_user_id');localStorage.removeItem('tager_role');localStorage.removeItem('tager_name');go('home')}
    function app(){return $('#app')}
    function go(page, data={}){window.scrollTo({top:0,behavior:'smooth'});render(page,data);history.replaceState(null,'','#'+page)}
    window.addEventListener('hashchange',()=>render(location.hash.replace('#','')||'home'));
    function toggleMenu(){$('#navlinks').classList.toggle('open')}
    function navActive(page){$$('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===page))}
    function updateCartCount(){const s=load(); const n=(s.cart||[]).reduce((a,i)=>a+Number(i.qty||0),0); const el=$('#cartCount'); if(el) el.textContent=n}
    function notify(text,type='success'){return `<div class="${type}">${text}</div>`}
    function pageShell(title,sub,body){return `<section class="wrap page"><h1 class="page-title">${title}</h1>${sub?`<p class="sub-title">${sub}</p>`:''}${body}</section>`}
    function optionsGov(selected=''){return Object.keys(EGYPT).map(g=>`<option ${g===selected?'selected':''}>${g}</option>`).join('')}
    function optionsDistrict(gov,selected=''){return (EGYPT[gov]||[]).map(d=>`<option ${d===selected?'selected':''}>${d}</option>`).join('')}
    function bindArea(form){const g=form.querySelector('[name=governorate]'), d=form.querySelector('[name=district]'); if(!g||!d)return; const refresh=()=>{d.innerHTML=optionsDistrict(g.value,d.value)}; g.onchange=refresh; refresh()}
    function findVendorByUser(s,userId){return s.vendors.find(v=>v.userId===userId)}
    function approvedProducts(s){return s.products.filter(p=>p.status==='approved')}
    function approvedVendors(s){const approvedUsers=s.users.filter(u=>u.role==='vendor'&&u.status==='approved').map(u=>u.id);return s.vendors.filter(v=>approvedUsers.includes(v.userId))}
    function kpis(s){const sales=s.orders.reduce((a,o)=>a+Number(o.total||0),0); const paid=s.payments.filter(p=>p.status==='approved').reduce((a,p)=>a+Number(p.amount||0),0); const commission=s.orders.reduce((a,o)=>a+Number(o.commission||0),0); return {sales,paid,commission,orders:s.orders.length,products:s.products.length,vendors:s.vendors.length,users:s.users.length,approvedVendors:approvedVendors(s).length,approvedProducts:approvedProducts(s).length,areas:Object.values(EGYPT).flat().length,govs:Object.keys(EGYPT).length,cats:s.categories.length}}

    function home(){const s=load(), k=kpis(s); const av=approvedVendors(s), ap=approvedProducts(s); return `<section class="wrap page simple-home">
      <div class="simple-hero"><div><span class="kicker">منصة تاجر للتجارة بالجملة</span><h1><span>أسعار واضحة</span> لكل بند: قطاعي، جملة، وجملة الجملة</h1><p class="muted" style="font-size:19px">واجهة أبسط وأوضح للمشتري والمورد: ابحث، قارن الأسعار الثلاثة، أضف الصورة، وحدد الكمية والتغطية قبل إرسال الطلب.</p><div class="hero-actions"><button class="btn" onclick="go('products')">عرض المنتجات</button><button class="btn3" onclick="go('registerVendor')">إضافة مورد</button><button class="btn3" onclick="go('track')">تتبع طلب</button></div></div><div class="hero-art"><div class="globe"></div><div class="container-box"></div><div class="box-stack"></div><div class="forklift"></div><span class="pin p1"></span><span class="pin p2"></span><span class="pin p3"></span><div class="float-icon fi1">🏷️</div><div class="float-icon fi2">📷</div><div class="float-icon fi3">📦</div></div></div>
      <div class="quick-kpis"><div class="quick-kpi"><span>أنواع الأسعار</span><b>3</b><small class="muted">قطاعي / جملة / جملة الجملة</small></div><div class="quick-kpi"><span>فئات جاهزة</span><b>${k.cats}</b><small class="muted">مواد ومنتجات</small></div><div class="quick-kpi"><span>محافظات</span><b>${k.govs}</b><small class="muted">تغطية مصر</small></div><div class="quick-kpi"><span>مراكز</span><b>${k.areas}</b><small class="muted">اختيار التوصيل</small></div></div>
      <div class="searchbar"><select id="homeCat"><option value="">كل الفئات</option>${s.categories.filter(c=>c.active).map(c=>`<option>${c.name}</option>`).join('')}</select><input id="homeQ" placeholder="ابحث عن منتج أو مورد"><select id="homeGov"><option value="">كل المحافظات</option>${optionsGov()}</select><select id="homeType"><option value="products">منتجات</option><option value="suppliers">موردون</option></select><button class="btn2" onclick="quickSearch()">بحث</button></div>
      <div class="price-guide"><div class="card"><h3>سعر القطاعي</h3><p class="muted">للشراء بكميات صغيرة أو طلبات التجربة.</p></div><div class="card"><h3>سعر الجملة</h3><p class="muted">السعر الأساسي للمحلات والتجار.</p></div><div class="card"><h3>سعر جملة الجملة</h3><p class="muted">للكميات الكبيرة والموزعين.</p></div></div>
      <div class="simple-section"><div class="section-head"><div><h2>الفئات</h2><p class="muted">اختيار سريع للمواد والمنتجات.</p></div><button class="btn3" onclick="go('categories')">عرض الكل</button></div><div class="grid">${s.categories.slice(0,8).map(c=>`<div class="card category-card"><span class="icon">${c.icon}</span><div><h3>${c.name}</h3><p class="muted" style="margin:0">${c.description}</p></div></div>`).join('')}</div></div>
      <div class="simple-section"><div class="section-head"><div><h2>المنتجات</h2><p class="muted">كل منتج يظهر بصورة واضحة وثلاثة أسعار تساعد على اختيار طريقة الشراء المناسبة.</p></div><button class="btn3" onclick="go('products')">عرض المنتجات</button></div>${ap.length?productGrid(ap):`<div class="empty">لا توجد منتجات متاحة حالياً. عند إضافة المنتجات ستظهر هنا بالصور والأسعار بشكل واضح.</div>`}</div>
      <div class="simple-section"><div class="section-head"><div><h2>الموردون</h2><p class="muted">الموردون المتاحون يظهرون مع مناطق التغطية وخيارات التوصيل.</p></div><button class="btn3" onclick="go('suppliers')">عرض الموردين</button></div>${av.length?supplierGrid(av):`<div class="empty">لا يوجد موردون متاحون حالياً. ستظهر قائمة الموردين هنا عند توفرهم.</div>`}</div>
    </section>${howSection()}${footer()}`}

    function trustBand(){return `<section class="wrap band section"><div><b>شراء موثوق</b><p class="muted">منتجات وموردون ببيانات واضحة.</p></div><div><b>تغطية واضحة</b><p class="muted">المحافظة والمركز قبل الطلب.</p></div><div><b>دعم متواصل</b><p class="muted">مساعدة ومتابعة داخل المنصة.</p></div><div><b>حسابات منظمة</b><p class="muted">تفاصيل الطلب والمستحقات موضحة لكل طرف.</p></div></section>`}
    function howSection(){return `<section class="wrap section"><div class="section-head"><div><h2>كيف يعمل تاجر؟</h2><p class="muted">رحلة مختصرة من البحث إلى الاستلام.</p></div><button class="btn3" onclick="go('how')">التفاصيل</button></div><div class="journey"><div class="step"><span class="num">1</span><h3>ابحث</h3><p class="muted">ابحث عن منتج أو مورد.</p></div><div class="step"><span class="num">2</span><h3>قارن</h3><p class="muted">قارن السعر والتغطية.</p></div><div class="step"><span class="num">3</span><h3>اطلب</h3><p class="muted">أرسل الطلب بعد الفحص.</p></div><div class="step"><span class="num">4</span><h3>تابع</h3><p class="muted">تابع حالة الطلب.</p></div><div class="step"><span class="num">5</span><h3>استلم</h3><p class="muted">استلم وقيّم التجربة.</p></div></div></section>`}
    function footer(){const s=load(); return `<footer class="wrap footer"><div class="footer-grid"><div><img class="logo-plain" src="/tager-logo.png" alt="Tager"><p class="muted">منصة تجارة وتوريد تربط المشترين بالموردين وتدعم التشغيل والرقابة من مكان واحد.</p></div><div><h3>روابط مهمة</h3><p class="muted"><a href="#products" onclick="go('products')">المنتجات</a><br><a href="#categories" onclick="go('categories')">الفئات</a><br><a href="#suppliers" onclick="go('suppliers')">الموردون</a><br><a href="#coverage" onclick="go('coverage')">التغطية</a></p></div><div><h3>المساعدة</h3><p class="muted"><a href="#support" onclick="go('support')">الدعم</a><br><a href="#track" onclick="go('track')">تتبع الطلب</a><br><a href="#policies" onclick="go('policies')">السياسات</a></p></div><div><h3>التواصل</h3><p class="muted">واتساب: ${s.settings.whatsapp}<br>دعم: ${s.settings.supportPhone}<br>${s.settings.email}</p></div><div><h3>حمل التطبيق لاحقاً</h3><span class="app-badge">Google Play</span><span class="app-badge">App Store</span><p class="muted">واجهة جاهزة للتطبيق لاحقاً.</p></div></div></footer>`}

    function quickSearch(){const type=$('#homeType').value, q=$('#homeQ').value.trim(), cat=$('#homeCat').value, gov=$('#homeGov').value; go(type,{q,cat,gov})}
    function productImageForCategory(cat=''){const c=String(cat||''); if(c.includes('مشروبات'))return 'product-water.svg'; if(c.includes('ألبان'))return 'product-milk.svg'; if(c.includes('منظفات'))return 'product-detergent.svg'; if(c.includes('ورقيات'))return 'product-tissue.svg'; if(c.includes('غذائية'))return 'product-rice.svg'; return 'tager-logo.png'}
    function tierPrice(p,tier='wholesale'){const retail=Number(p.priceRetail ?? p.retailPrice ?? p.price ?? 0); const wholesale=Number(p.priceWholesale ?? p.wholesalePrice ?? p.price ?? retail); const bulk=Number(p.priceBulk ?? p.bulkPrice ?? wholesale); if(tier==='retail')return retail||wholesale||bulk; if(tier==='bulk')return bulk||wholesale||retail; return wholesale||retail||bulk}
    function tierLabel(tier='wholesale'){return ({retail:'قطاعي',wholesale:'جملة',bulk:'جملة الجملة'})[tier]||'جملة'}
    function productPriceTiers(p){return `<div class="price-tiers"><div class="price-tier"><span>قطاعي</span><strong>${fmt(tierPrice(p,'retail'))}</strong></div><div class="price-tier main"><span>جملة</span><strong>${fmt(tierPrice(p,'wholesale'))}</strong></div><div class="price-tier"><span>جملة الجملة</span><strong>${fmt(tierPrice(p,'bulk'))}</strong></div></div>`}
    function supplierGrid(list){return `<div class="grid">${list.map(v=>`<div class="card supplier-card"><div class="thumb"><span style="font-size:52px">🏬</span></div><h3>${escapeHtml(v.storeName)}</h3><p class="muted">${escapeHtml(v.activity||'مورد متاح')}<br>${escapeHtml(v.governorate||'')} ${v.district?' - '+escapeHtml(v.district):''}</p><p><span class="badge ok">متاح</span></p><button class="btn3" onclick="go('supplierDetails',{id:'${v.id}'})">عرض المورد</button></div>`).join('')}</div>`}
    function productGrid(list){return `<div class="grid">${list.map(p=>`<div class="card product-card"><div class="thumb"><img src="${p.image||productImageForCategory(p.category)}" alt="${escapeHtml(p.name)}" onerror="this.src='tager-logo.png'"></div><h3>${escapeHtml(p.name)}</h3><p class="muted">${escapeHtml(p.category||'')}<br>الحد الأدنى: ${Number(p.minQty||1).toLocaleString('ar-EG')} قطعة</p>${productPriceTiers(p)}<div class="product-actions"><button class="btn3" onclick="addCart('${p.id}','retail')">قطاعي</button><button class="btn" onclick="addCart('${p.id}','wholesale')">جملة</button><button class="btn2" onclick="addCart('${p.id}','bulk')">جملة الجملة</button></div></div>`).join('')}</div>`}
    function escapeHtml(str=''){return String(str).replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[s]))}

    function productsPage(filter={}){const s=load();let arr=approvedProducts(s); if(filter.q) arr=arr.filter(p=>p.name.includes(filter.q)||String(p.category).includes(filter.q)); if(filter.cat) arr=arr.filter(p=>p.category===filter.cat); if(filter.sort==='price') arr=arr.sort((a,b)=>tierPrice(a,'wholesale')-tierPrice(b,'wholesale')); else arr=arr.sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),'ar')); const body=`<div class="searchbar" style="grid-template-columns:1fr 2fr 1fr auto"><select id="pCat"><option value="">كل الفئات</option>${s.categories.map(c=>`<option ${filter.cat===c.name?'selected':''}>${c.name}</option>`).join('')}</select><input id="pQ" value="${escapeHtml(filter.q||'')}" placeholder="بحث باسم المنتج"><select id="pSort"><option value="name" ${filter.sort!=='price'?'selected':''}>ترتيب بالاسم</option><option value="price" ${filter.sort==='price'?'selected':''}>ترتيب بسعر الجملة</option></select><button class="btn2" onclick="go('products',{q:$('#pQ').value,cat:$('#pCat').value,sort:$('#pSort').value})">بحث</button></div>${arr.length?productGrid(arr):`<div class="empty">لا توجد منتجات متاحة حالياً. المنتج سيظهر هنا بصورة واضحة وثلاثة أسعار: قطاعي، جملة، وجملة الجملة.</div>`}<div class="section grid3"><div class="card"><h3>أسعار واضحة</h3><p class="muted">كل منتج يوضح سعر القطاعي، الجملة، وجملة الجملة بشكل مباشر.</p></div><div class="card"><h3>صورة واضحة</h3><p class="muted">كل منتج يظهر بصورة تساعد العميل على التعرف عليه بسهولة.</p></div><div class="card"><h3>بيانات مهمة</h3><p class="muted">يشاهد العميل الاسم والفئة والأسعار والحد الأدنى المناسب لكل نوع شراء.</p></div></div>`; return pageShell('المنتجات','منتجات واضحة بصورة وسعر قطاعي وسعر جملة وسعر جملة الجملة لكل بند.',body)}
    function categoriesPage(){const s=load();return pageShell('الفئات','إدارة وعرض فئات المنصة مع الحفاظ على الألوان والهوية.',`<div class="grid">${s.categories.map(c=>`<div class="card category-card"><span class="icon">${c.icon}</span><div><h3>${escapeHtml(c.name)}</h3><p class="muted" style="margin:0">${escapeHtml(c.description)}</p><span class="badge ${c.active?'ok':'pending'}">${c.active?'نشطة':'موقوفة'}</span></div></div>`).join('')}</div>`) }
    function suppliersPage(filter={}){const s=load();let arr=approvedVendors(s); if(filter.q) arr=arr.filter(v=>v.storeName.includes(filter.q)||String(v.activity).includes(filter.q)); if(filter.gov) arr=arr.filter(v=>v.governorate===filter.gov); return pageShell('الموردون','قائمة بالموردين المتاحين للتعامل داخل المنصة.',`<div class="searchbar" style="grid-template-columns:1.5fr 1fr auto"><input id="sQ" value="${escapeHtml(filter.q||'')}" placeholder="بحث باسم المورد أو النشاط"><select id="sGov"><option value="">كل المحافظات</option>${optionsGov(filter.gov||'')}</select><button class="btn2" onclick="go('suppliers',{q:$('#sQ').value,gov:$('#sGov').value})">بحث</button></div>${arr.length?supplierGrid(arr):`<div class="empty">لا يوجد موردون متاحون حالياً. ستظهر قائمة الموردين هنا عند توفرهم.</div>`}`)}
    function supplierDetailsPage(data){const s=load();const v=s.vendors.find(x=>x.id===data.id); if(!v) return pageShell('صفحة المورد','',`<div class="empty">المورد غير موجود.</div>`); const prods=approvedProducts(s).filter(p=>p.vendorId===v.userId); return pageShell(v.storeName,'صفحة مورد مستقلة تشمل النشاط والتغطية والمنتجات الخاصة به.',`<div class="split"><div>${prods.length?productGrid(prods):'<div class="empty">لا توجد منتجات متاحة لهذا المورد حالياً.</div>'}</div><aside class="panel"><h3>بيانات المورد</h3><p class="muted">النشاط: ${escapeHtml(v.activity||'غير محدد')}<br>المحافظة: ${escapeHtml(v.governorate||'')}<br>المركز: ${escapeHtml(v.district||'')}<br>الحد الأدنى: ${fmt(v.minOrder||0)}</p><h3>مناطق التغطية</h3>${(v.zones||[]).length?`<div class="list">${v.zones.map(z=>`<div class="list-item"><span>${z.governorate} - ${z.district}</span><b>📍</b></div>`).join('')}</div>`:'<p class="muted">لم يتم إضافة مناطق تغطية بعد.</p>'}</aside></div>`)}
    function coveragePage(){return pageShell('مناطق التغطية','صفحة واضحة للمحافظات والمراكز، وتستخدم في فحص الطلب قبل الإرسال.',`<div class="grid">${Object.entries(EGYPT).map(([g,ds])=>`<div class="card"><h3>${g}</h3><p class="muted">${ds.join('، ')}</p><span class="badge">${ds.length} مراكز</span></div>`).join('')}</div>`)}
    function howPage(){return pageShell('كيف تعمل المنصة؟','شرح كامل لرحلة العميل والمورد والإدارة داخل تاجر.',`${howSection()}<div class="grid3 section"><div class="card"><h3>للعميل</h3><p class="muted">تسجيل الحساب، اختيار العنوان، البحث، إضافة للسلة، التأكد من التغطية، تأكيد الطلب، ثم التتبع.</p></div><div class="card"><h3>للمورد</h3><p class="muted">إضافة المنتجات، تحديد مناطق التوصيل، متابعة الطلبات، مراجعة الفواتير، ومتابعة الحساب المالي.</p></div><div class="card"><h3>للإدارة</h3><p class="muted">إدارة الموردين والمنتجات، ضبط الإعدادات المالية، متابعة الطلبات، الدعم، والتقارير.</p></div></div>`)}

    function loginPage(){return pageShell('تسجيل الدخول','ادخل برقم الهاتف وكلمة المرور بعد إنشاء الحساب.',`<div class="card auth-card"><form id="loginForm" class="grid2"><div class="field"><label>رقم الهاتف</label><input name="phone" required></div><div class="field"><label>كلمة المرور</label><input name="password" type="password" required></div><div class="copy-row"><button class="btn">دخول</button><button type="button" class="btn3" onclick="go('setup')">إعداد حساب الإدارة</button><button type="button" class="btn3" onclick="go('registerCustomer')">تسجيل عميل</button></div></form><div id="out" style="margin-top:12px"></div></div>`)}
    function setupPage(){const s=load(); const exists=s.users.some(u=>u.role==='admin'); return pageShell('إعداد حساب الإدارة','هذه الخطوة تنشئ حساب الإدارة الحقيقي داخل المتصفح بدون بيانات جاهزة مسبقاً.',exists?`<div class="success">تم إنشاء حساب الإدارة بالفعل. يمكنك تسجيل الدخول.</div><button class="btn" onclick="go('login')">تسجيل الدخول</button>`:`<div class="card auth-card"><form id="setupForm" class="grid2"><div class="field"><label>اسم المسؤول</label><input name="name" required></div><div class="field"><label>رقم الهاتف</label><input name="phone" required></div><div class="field"><label>البريد الإلكتروني</label><input name="email"></div><div class="field"><label>كلمة المرور</label><input name="password" type="password" required></div><button class="btn">إنشاء حساب الإدارة</button></form><div id="out" style="margin-top:12px"></div></div>`)}
    function registerPage(kind){const vendor=kind==='vendor';return pageShell(vendor?'تسجيل مورد':'تسجيل عميل',vendor?'بعد التسجيل يظهر المورد في لوحة الإدارة للاعتماد.':'تسجيل العميل لإرسال الطلبات وتتبعها.',`<div class="card auth-card"><form id="regForm" class="grid2"><div class="field"><label>${vendor?'اسم المسؤول':'اسم العميل'}</label><input name="name" required></div>${vendor?`<div class="field"><label>اسم المتجر / الشركة</label><input name="storeName" required></div><div class="field"><label>نوع النشاط</label><select name="activity">${CATEGORY_MASTER.map(c=>`<option>${c[0]}</option>`).join('')}</select></div>`:''}<div class="field"><label>رقم الهاتف</label><input name="phone" required></div><div class="field"><label>البريد الإلكتروني</label><input name="email"></div><div class="field"><label>كلمة المرور</label><input name="password" type="password" required></div><div class="field"><label>المحافظة</label><select name="governorate">${optionsGov()}</select></div><div class="field"><label>المركز</label><select name="district"></select></div><div class="field"><label>العنوان التفصيلي</label><input name="address"></div><button class="btn">تسجيل</button></form><div id="out" style="margin-top:12px"></div></div>`)}

    function customerPage(){if(role()!=='customer') return loginRequired(); const s=load(); const my=s.orders.filter(o=>o.customerId===uid()); return pageShell('لوحة العميل','متابعة الطلبات والعناوين والسلة والدعم.',`<div class="grid3"><div class="card"><h3>طلباتي</h3><div class="price">${my.length}</div></div><div class="card"><h3>إجمالي الطلبات</h3><div class="price">${fmt(my.reduce((a,o)=>a+Number(o.total||0),0))}</div></div><div class="card"><h3>السلة</h3><div class="price">${s.cart.length}</div></div></div><div class="tabs"><button class="tab active">الطلبات</button><button class="tab" onclick="go('products')">شراء جديد</button><button class="tab" onclick="go('support')">الدعم</button><button class="tab" onclick="logout()">خروج</button></div>${ordersTable(my)}`)}
    function vendorPage(){if(role()!=='vendor') return loginRequired(); const s=load(); const v=findVendorByUser(s,uid()); if(!v) return pageShell('لوحة المورد','',`<div class="empty">بيانات المورد غير موجودة.</div>`); const prods=s.products.filter(p=>p.vendorId===uid()); const ords=s.orders.filter(o=>o.items.some(i=>i.vendorId===uid())); const sales=ords.reduce((a,o)=>a+o.items.filter(i=>i.vendorId===uid()).reduce((x,i)=>x+i.price*i.qty,0),0); const comm=ords.reduce((a,o)=>a+o.items.filter(i=>i.vendorId===uid()).reduce((x,i)=>x+(i.price*i.qty*(Number(s.settings.defaultCommission)||0)/100),0),0); return pageShell('لوحة المورد','متابعة منتجاتك ومناطق التوصيل وملخص حساباتك بشكل واضح.',`<div class="grid"><div class="card"><h3>المنتجات</h3><div class="price">${prods.length}</div></div><div class="card"><h3>الطلبات</h3><div class="price">${ords.length}</div></div><div class="card"><h3>المبيعات</h3><div class="price">${fmt(sales)}</div></div><div class="card"><h3>رسوم المنصة</h3><div class="price">${fmt(comm)}</div></div></div><div class="tabs"><button class="tab active" onclick="showLocal('v-products')">المنتجات</button><button class="tab" onclick="showLocal('v-coverage')">التغطية</button><button class="tab" onclick="showLocal('v-orders')">الطلبات</button><button class="tab" onclick="showLocal('v-finance')">الحساب المالي</button><button class="tab" onclick="logout()">خروج</button></div><div id="v-products" class="local-tab">${productForm()}${productsTable(prods)}</div><div id="v-coverage" class="local-tab hidden">${zoneForm(v)}${zonesTable(v.zones||[])}</div><div id="v-orders" class="local-tab hidden">${ordersTable(ords)}</div><div id="v-finance" class="local-tab hidden"><div class="card"><h3>الحساب المالي</h3><p class="muted">هنا تظهر ملخصات المبيعات والمستحقات والرسوم الخاصة بطلباتك بشكل واضح ومنظم.</p><div class="metric"><span>نسبة العمولة الحالية</span><strong>${s.settings.defaultCommission}%</strong></div><div class="metric"><span>رسوم السلة المميزة</span><strong>${s.settings.premiumBasketFee}%</strong></div></div></div><div id="out" style="margin-top:12px"></div>`)}
    function adminPage(){if(role()!=='admin') return loginRequired(); const s=load(), k=kpis(s); return pageShell('لوحة الإدارة','إدارة شاملة للمستخدمين والموردين والمنتجات والطلبات والمالية والإعدادات.',`<div class="grid"><div class="card"><h3>المستخدمون</h3><div class="price">${k.users}</div></div><div class="card"><h3>الموردون</h3><div class="price">${k.vendors}</div></div><div class="card"><h3>المنتجات</h3><div class="price">${k.products}</div></div><div class="card"><h3>الطلبات</h3><div class="price">${k.orders}</div></div></div><div class="tabs"><button class="tab active" onclick="showLocal('a-summary')">الملخص</button><button class="tab" onclick="showLocal('a-vendors')">الموردون</button><button class="tab" onclick="showLocal('a-products')">المنتجات</button><button class="tab" onclick="showLocal('a-orders')">الطلبات</button><button class="tab" onclick="showLocal('a-finance')">المالية</button><button class="tab" onclick="showLocal('a-settings')">الإعدادات</button><button class="tab" onclick="showLocal('a-data')">البيانات</button><button class="tab" onclick="logout()">خروج</button></div><div id="a-summary" class="local-tab"><div class="grid3"><div class="card"><h3>المبيعات</h3><div class="price">${fmt(k.sales)}</div></div><div class="card"><h3>عمولات مستحقة</h3><div class="price">${fmt(k.commission)}</div></div><div class="card"><h3>دفعات معتمدة</h3><div class="price">${fmt(k.paid)}</div></div></div><div class="section grid3"><div class="card"><h3>جاهزية الصفحات</h3><p class="muted">الرئيسية، المنتجات، الفئات، الموردون، التغطية، السلة، التتبع، الدعم، السياسات، لوحات الحسابات.</p></div><div class="card"><h3>نقاط الرقابة</h3><p class="muted">مراجعة المورد، مراجعة المنتج، فحص التغطية، إغلاق الطلب، ومراجعة الدفع.</p></div><div class="card"><h3>مؤشرات التشغيل</h3><p class="muted">طلبات جديدة، قيد التجهيز، تم التسليم، مرتجعات، بلاغات دعم.</p></div></div></div><div id="a-vendors" class="local-tab hidden">${adminVendorsTable(s)}</div><div id="a-products" class="local-tab hidden">${adminProductsTable(s)}</div><div id="a-orders" class="local-tab hidden">${ordersTable(s.orders)}</div><div id="a-finance" class="local-tab hidden">${financeAdmin(s)}</div><div id="a-settings" class="local-tab hidden">${settingsForm(s)}</div><div id="a-data" class="local-tab hidden">${dataTools()}</div><div id="out" style="margin-top:12px"></div>`)}
    function loginRequired(){return pageShell('تسجيل الدخول مطلوب','',`<div class="empty">يجب تسجيل الدخول للوصول لهذه الصفحة.</div><button class="btn" onclick="go('login')">تسجيل الدخول</button>`)}
    function roleRoute(){const r=role(); if(r==='admin') return go('admin'); if(r==='vendor') return go('vendor'); if(r==='customer') return go('customer'); return go('login')}
    function showLocal(id){$$('.local-tab').forEach(x=>x.classList.add('hidden')); const el=document.getElementById(id); if(el) el.classList.remove('hidden'); $$('.tab').forEach(x=>x.classList.remove('active')); event?.target?.classList?.add('active')}

    function productForm(){const s=load();return `<div class="card"><h3>إضافة منتج</h3><form id="productForm" class="grid3"><div class="field"><label>اسم المنتج</label><input name="name" required></div><div class="field"><label>الفئة</label><select name="category">${s.categories.map(c=>`<option>${c.name}</option>`).join('')}</select></div><div class="field"><label>سعر القطاعي</label><input name="priceRetail" type="number" min="0" step="0.01" required></div><div class="field"><label>سعر الجملة</label><input name="priceWholesale" type="number" min="0" step="0.01" required></div><div class="field"><label>سعر جملة الجملة</label><input name="priceBulk" type="number" min="0" step="0.01" required></div><div class="field"><label>المخزون</label><input name="stock" type="number" min="0" value="0"></div><div class="field"><label>الحد الأدنى للطلب</label><input name="minQty" type="number" min="1" value="1"></div><div class="field"><label>صورة المنتج</label><input name="imageFile" type="file" accept="image/*"><div class="image-preview-note">أضف صورة واضحة تساعد على عرض المنتج بشكل أفضل.</div></div><div class="field"><label>رابط إضافي للصورة (اختياري)</label><input name="image" placeholder="اختياري"></div><button class="btn">حفظ المنتج</button></form></div>`}
    function zoneForm(v){return `<div class="card"><h3>إضافة منطقة تغطية</h3><form id="zoneForm" class="grid3"><div class="field"><label>المحافظة</label><select name="governorate">${optionsGov(v?.governorate||'')}</select></div><div class="field"><label>المركز</label><select name="district"></select></div><div class="field"><label>ملاحظات</label><input name="notes" placeholder="اختياري"></div><button class="btn">حفظ المنطقة</button></form></div>`}
    function productsTable(arr){return arr.length?`<div class="table-wrap"><table class="admin-price-table"><tr><th>الصورة</th><th>المنتج</th><th>الفئة</th><th>قطاعي</th><th>جملة</th><th>جملة الجملة</th><th>المخزون</th><th>الحالة</th></tr>${arr.map(p=>`<tr><td><img src="${p.image||productImageForCategory(p.category)}" onerror="this.src='tager-logo.png'" style="width:46px;height:46px;object-fit:contain;border-radius:12px;border:1px solid var(--line)"></td><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.category)}</td><td>${fmt(tierPrice(p,'retail'))}</td><td>${fmt(tierPrice(p,'wholesale'))}</td><td>${fmt(tierPrice(p,'bulk'))}</td><td>${p.stock}</td><td><span class="badge ${p.status}">${statusAr(p.status)}</span></td></tr>`).join('')}</table></div>`:`<div class="empty">لا توجد منتجات بعد.</div>`}
    function zonesTable(arr){return arr.length?`<div class="table-wrap"><table><tr><th>المحافظة</th><th>المركز</th><th>ملاحظات</th></tr>${arr.map(z=>`<tr><td>${z.governorate}</td><td>${z.district}</td><td>${escapeHtml(z.notes||'')}</td></tr>`).join('')}</table></div>`:`<div class="empty">لم يتم إضافة مناطق تغطية بعد.</div>`}
    function ordersTable(arr){return arr.length?`<div class="table-wrap"><table><tr><th>رقم الطلب</th><th>التاريخ</th><th>الإجمالي</th><th>الحالة</th><th>الدفع</th></tr>${arr.map(o=>`<tr><td>${o.orderNo}</td><td>${o.date}</td><td>${fmt(o.total)}</td><td><span class="badge ${o.status}">${statusAr(o.status)}</span></td><td>${o.paymentMethod}</td></tr>`).join('')}</table></div>`:`<div class="empty">لا توجد طلبات.</div>`}
    function statusAr(st){return ({pending:'قيد المراجعة',approved:'معتمد',rejected:'مرفوض',new:'جديد',processing:'قيد التجهيز',delivered:'تم التسليم',cancelled:'ملغي'})[st]||st||'جديد'}
    function adminVendorsTable(s){const arr=s.users.filter(u=>u.role==='vendor'); return arr.length?`<div class="table-wrap"><table><tr><th>المورد</th><th>الهاتف</th><th>الحالة</th><th>إجراء</th></tr>${arr.map(u=>`<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.phone)}</td><td><span class="badge ${u.status}">${statusAr(u.status)}</span></td><td><button class="btn-ok" onclick="approveUser('${u.id}')">اعتماد</button> <button class="btn-danger" onclick="rejectUser('${u.id}')">رفض</button></td></tr>`).join('')}</table></div>`:`<div class="empty">لا يوجد موردون مسجلون.</div>`}

    function bindForms(page){setTimeout(()=>{const lf=$('#loginForm'); if(lf) lf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(lf)); const u=s.users.find(u=>u.phone===f.phone&&u.password===f.password); const out=$('#out'); if(!u) return out.innerHTML=notify('بيانات الدخول غير صحيحة.','error'); if(u.status==='pending') return out.innerHTML=notify('الحساب في انتظار موافقة الإدارة.','error'); if(u.status==='rejected') return out.innerHTML=notify('تم رفض الحساب من الإدارة.','error'); setSession(u); roleRoute()};

      const pf=$('#productForm'); if(pf){pf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(pf)); const file=pf.querySelector('[name=imageFile]')?.files?.[0]; const commit=(img)=>{const wholesale=Number(f.priceWholesale||0); s.products.push({id:id(),vendorId:uid(),name:f.name,category:f.category,price:wholesale,priceRetail:Number(f.priceRetail||0),priceWholesale:wholesale,priceBulk:Number(f.priceBulk||0),stock:Number(f.stock||0),minQty:Number(f.minQty||1),image:img||f.image||productImageForCategory(f.category),status:'pending',createdAt:today()}); save(s); $('#out').innerHTML=notify('تم حفظ المنتج بالصور والأسعار بنجاح، وسيظهر بعد المراجعة.'); setTimeout(()=>go('vendor'),500)}; if(file){const reader=new FileReader(); reader.onload=()=>commit(reader.result); reader.onerror=()=>commit(f.image); reader.readAsDataURL(file)}else commit(f.image)}}
      const zf=$('#zoneForm'); if(zf){bindArea(zf); zf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(zf)); const v=findVendorByUser(s,uid()); if(!v) return; v.zones=v.zones||[]; v.zones.push({governorate:f.governorate,district:f.district,notes:f.notes}); save(s); $('#out').innerHTML=notify('تمت إضافة منطقة التغطية.'); go('vendor')}}
      const cf=$('#checkoutForm'); if(cf){bindArea(cf); cf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(cf)); if(!uid()) return $('#out').innerHTML=notify('يجب تسجيل الدخول كعميل لإرسال الطلب.','error'); if(!s.cart.length) return $('#out').innerHTML=notify('السلة فارغة.','error'); const notCovered=[]; for(const item of s.cart){const v=s.vendors.find(v=>v.userId===item.vendorId); const ok=(v?.zones||[]).some(z=>z.governorate===f.governorate&&z.district===f.district); if(!ok) notCovered.push(item.name)} if(notCovered.length) return $('#out').innerHTML=notify('لا يمكن إرسال الطلب: بعض الموردين لا يغطون منطقة التوصيل المختارة.','error'); const subtotal=s.cart.reduce((a,i)=>a+i.price*i.qty,0); const extra=f.cartType==='premium'?subtotal*(Number(s.settings.premiumBasketFee||0)/100):0; const commission=subtotal*(Number(s.settings.defaultCommission||0)/100); const order={id:id(),orderNo:'TG-'+String(1000+s.orders.length+1),customerId:uid(),phone:(s.users.find(u=>u.id===uid())||{}).phone||'',date:today(),items:[...s.cart],governorate:f.governorate,district:f.district,address:f.address,paymentMethod:f.paymentMethod,cartType:f.cartType,total:subtotal+extra+Number(s.settings.deliveryBase||0),commission,status:'new'}; s.orders.push(order); s.cart=[]; save(s); $('#out').innerHTML=notify('تم إرسال الطلب بنجاح. رقم الطلب: '+order.orderNo);};}
      const tf=$('#trackForm'); if(tf){tf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(tf)); const o=s.orders.find(o=>o.orderNo===f.orderNo&&String(o.phone||'')===String(f.phone||'')); $('#out').innerHTML=o?`<div class="success"><b>حالة الطلب:</b> ${statusAr(o.status)}<br><b>الإجمالي:</b> ${fmt(o.total)}<br><b>العنوان:</b> ${o.governorate} - ${o.district}</div>`:notify('لم يتم العثور على الطلب.','error')}}

    // Live system layer - keeps the same files and design while adding live monitoring and operational controls.
    const __baseHome = home;
    const __baseAdminPage = adminPage;
    const __baseVendorPage = vendorPage;
    const __baseCustomerPage = customerPage;
    const __baseOrdersTable = ordersTable;
    const __baseSave = save;
    function nowStamp(){return new Date().toLocaleString('ar-EG',{hour12:true})}
    function ensureLive(s){
      s.live = s.live || {enabled:true,lastSync:'',health:92};
      s.activityLog = Array.isArray(s.activityLog)?s.activityLog:[];
      return s;
    }
    save=function(s){
      ensureLive(s);
      s.live.lastSync = nowStamp();
      __baseSave(s);
    };
    function liveCounts(s){
      s=ensureLive(s);
      const lowStock=s.products.filter(p=>Number(p.stock||0)<=5).length;
      const pendingVendors=s.users.filter(u=>u.role==='vendor'&&u.status==='pending').length;
      const pendingProducts=s.products.filter(p=>p.status==='pending').length;
      const newOrders=s.orders.filter(o=>['new','processing'].includes(o.status||'new')).length;
      const openTickets=s.tickets.filter(t=>(t.status||'new')!=='closed').length;
      const delivered=s.orders.filter(o=>o.status==='delivered').length;
      const sales=s.orders.reduce((a,o)=>a+Number(o.total||0),0);
      const commission=s.orders.reduce((a,o)=>a+Number(o.commission||0),0);
      const readiness=calcReadiness(s);
      return {lowStock,pendingVendors,pendingProducts,newOrders,openTickets,delivered,sales,commission,readiness};
    }
    function calcReadiness(s){
      const checks=[
        true,
        !!s.settings.supportPhone,
        !!s.settings.whatsapp,
        !!s.settings.email,
        s.categories.length>0,
        Object.keys(EGYPT).length>=20,
        true,
        true,
        true,
        true
      ];
      return Math.round((checks.filter(Boolean).length/checks.length)*100);
    }
    function liveRibbon(){
      const s=load(), c=liveCounts(s);
      const sync=s.live?.lastSync||'جاهز للتشغيل';
      return `<div class="live-ribbon"><div><span class="live-pill"><span class="live-pulse"></span> النظام لايف وجاهز للنشر</span><p class="muted" style="margin:8px 0 0">تحديث تلقائي للعدادات والطلبات والاعتمادات داخل نفس التصميم ونفس الصفحة.</p></div><div class="copy-row"><span class="chip">آخر تحديث: ${sync}</span><span class="chip">جاهزية: ${c.readiness}%</span><span class="chip">تنبيهات مفتوحة: ${c.openTickets+c.pendingVendors+c.pendingProducts}</span></div></div>`
    }
    home=function(){return liveRibbon()+__baseHome()};
    function liveEvents(s){
      const ev=[];
      s.orders.slice().reverse().slice(0,8).forEach(o=>ev.push({type:'طلب',title:o.orderNo||'طلب جديد',meta:statusAr(o.status),time:o.date||'',icon:'🧾'}));
      s.users.filter(u=>u.role==='vendor'&&u.status==='pending').slice(-6).reverse().forEach(u=>ev.push({type:'اعتماد مورد',title:u.name||u.phone,meta:'بانتظار الإدارة',time:u.createdAt||'',icon:'🏬'}));
      s.products.filter(p=>p.status==='pending').slice(-6).reverse().forEach(p=>ev.push({type:'اعتماد منتج',title:p.name,meta:p.category, time:p.createdAt||'', icon:'📦'}));
      s.tickets.slice().reverse().slice(0,6).forEach(t=>ev.push({type:'دعم',title:t.type||'تذكرة دعم',meta:t.priority||'عادية',time:t.createdAt||'',icon:'🎧'}));
      if(!ev.length) ev.push({type:'جاهزية',title:'لا توجد أحداث حتى الآن',meta:'سيظهر هنا كل جديد مباشرة بعد التسجيل أو الطلب',time:nowStamp(),icon:'✅'});
      return ev.slice(0,14).map(e=>`<div class="feed-item"><span class="icon">${e.icon}</span><div><b>${escapeHtml(e.type)}</b><div>${escapeHtml(e.title)}</div><small class="muted">${escapeHtml(e.meta||'')}</small></div><span class="feed-time">${escapeHtml(e.time||'')}</span></div>`).join('');
    }
    function liveHealthCard(s){
      const c=liveCounts(s);

    const __baseRender = render;
    render=function(page='home',data={}){
      if(page==='live'){
        navActive(page); updateCartCount(); app().innerHTML=livePage(); bindForms(page); return;
      }
      __baseRender(page,data);
    };

    /* Comprehensive developed layer - same files, same colors, richer pages */
    const __developedBaseLoad = load;
    load=function(){const s=__developedBaseLoad();return ensureDevelopedState(s)};
    function ensureDevelopedState(s){
      s.quotes=Array.isArray(s.quotes)?s.quotes:[];
      s.favorites=Array.isArray(s.favorites)?s.favorites:[];
      s.notifications=Array.isArray(s.notifications)?s.notifications:[];
      s.returns=Array.isArray(s.returns)?s.returns:[];
      s.auditLog=Array.isArray(s.auditLog)?s.auditLog:[];
      s.settings=s.settings||{};
      s.settings.marketName=s.settings.marketName||'تاجر';
      s.settings.homeHeadline=s.settings.homeHeadline||'منصة تجارة جملة واضحة وسهلة';
      return s;
    }
    function developedKpis(s){
      const base=kpis(s), approved=approvedProducts(s), vendors=approvedVendors(s);
      const withImages=s.products.filter(p=>!!p.image).length;
      const completePrices=s.products.filter(p=>tierPrice(p,'retail')>0&&tierPrice(p,'wholesale')>0&&tierPrice(p,'bulk')>0).length;
      const openQuotes=s.quotes.filter(q=>(q.status||'new')!=='closed').length;
      const pages=18;
      return {...base,approvedProducts:approved.length,approvedVendors:vendors.length,withImages,completePrices,openQuotes,pages};
    }
    function sourceNameForProduct(s,p){const v=s.vendors.find(v=>v.userId===p.vendorId);return v?.storeName||'مورد غير محدد'}
    function vendorForProduct(s,p){return s.vendors.find(v=>v.userId===p.vendorId)}

    };
    function toggleFavorite(productId){
      const s=load(); if(!uid()) return alert('سجل الدخول كعميل لحفظ المنتج.');
      const exists=s.favorites.find(f=>f.userId===uid()&&f.productId===productId);
      if(exists) s.favorites=s.favorites.filter(f=>!(f.userId===uid()&&f.productId===productId));
      else s.favorites.push({id:id(),userId:uid(),productId,createdAt:today()});
      save(s); alert(exists?'تم إزالة المنتج من المفضلة':'تم حفظ المنتج في المفضلة');
    }

    function pricingCenterPage(){if(!role()) return loginRequired();const s=load();let arr=s.products||[];if(role()==='vendor')arr=arr.filter(p=>p.vendorId===uid());const rows=arr.map(p=>{const r=priceRisk(p);return `<tr><td><div style="display:flex;gap:10px;align-items:center"><img src="${escapeHtml(p.image||productImageForCategory(p.category))}" style="width:58px;height:58px;border-radius:14px;object-fit:cover"><div><b>${escapeHtml(p.name||'')}</b><div class="mini-note">${escapeHtml(p.category||'')} - ${escapeHtml(sourceNameForProduct(s,p))}</div></div></div></td><td>${fmt(tierPrice(p,'retail'))}</td><td>${fmt(tierPrice(p,'wholesale'))}</td><td>${fmt(tierPrice(p,'bulk'))}</td><td>${Number(p.stock||0).toLocaleString('ar-EG')}</td><td><span class="${r.cls}">${r.label}</span><div class="mini-note">${r.note}</div></td><td><button class="btn3" onclick="go('productDetails',{id:'${p.id}'})">فتح</button></td></tr>`}).join('');return pageShell('مركز التسعير','مراجعة سعر القطاعي والجملة وجملة الجملة لكل بند.',`<div class="section control-card"><h2>قاعدة التسعير</h2><p class="muted">لا يعتمد المنتج تجارياً إلا إذا كانت الصورة موجودة والأسعار الثلاثة مكتملة ومرتبة: قطاعي ≥ جملة ≥ جملة الجملة.</p><div class="quality-meter"><b style="width:${s.products.length?Math.round((arr.filter(p=>priceRisk(p).cls==='risk-ok').length/arr.length)*100):0}%"></b></div></div><div class="table-wrap"><table><tr><th>المنتج</th><th>قطاعي</th><th>جملة</th><th>جملة الجملة</th><th>المخزون</th><th>الحالة</th><th></th></tr>${rows||'<tr><td colspan="7" class="empty">لا توجد منتجات بعد.</td></tr>'}</table></div>`)}
    function deliveryCenterPage(){if(!role()) return loginRequired();const s=load();const admin=role()==='admin';const rows=(s.deliveryRules||[]).map((r,i)=>`<tr><td>${escapeHtml(r.governorate)}</td><td>${escapeHtml(r.district)}</td><td>${fmt(r.fee)}</td><td>${escapeHtml(r.sla||'')}</td><td>${r.active?'نشط':'موقوف'}</td><td>${admin?`<button class="btn-danger" onclick="deleteDeliveryRule(${i})">حذف</button>`:''}</td></tr>`).join('');const form=admin?`<div class="card"><h3>إضافة قاعدة توصيل</h3><form id="deliveryRuleForm" class="grid3"><div class="field"><label>المحافظة</label><select name="governorate">${optionsGov()}</select></div><div class="field"><label>المركز</label><select name="district"></select></div><div class="field"><label>رسوم التوصيل</label><input type="number" step="0.01" name="fee" required></div><div class="field"><label>مدة التوصيل</label><input name="sla" placeholder="مثال: 24 ساعة" required></div><div class="field"><label>الحالة</label><select name="active"><option value="true">نشط</option><option value="false">موقوف</option></select></div><button class="btn">حفظ القاعدة</button></form><div id="out" style="margin-top:12px"></div></div>`:'';return pageShell('الشحن والتغطية','رسوم ومدد توصيل واضحة حسب المحافظة والمركز.',`${form}<div class="section table-wrap"><table><tr><th>المحافظة</th><th>المركز</th><th>الرسوم</th><th>المدة</th><th>الحالة</th><th></th></tr>${rows||'<tr><td colspan="6" class="empty">لم يتم إضافة قواعد توصيل بعد.</td></tr>'}</table></div><div class="soft-alert section">مناطق الموردين ما زالت موجودة داخل لوحة المورد، وهذه الصفحة تضيف طبقة تشغيل للإدارة لتحديد الرسوم والمدد.</div>`)}
    function invoicesCenterPage(){if(!role())return loginRequired();const s=load();let arr=s.orders||[];if(role()==='customer')arr=arr.filter(o=>o.customerId===uid());if(role()==='vendor')arr=arr.filter(o=>(o.items||[]).some(i=>i.vendorId===uid()));const rows=arr.map(o=>`<tr><td>${escapeHtml(o.orderNo)}</td><td>${escapeHtml(o.date||'')}</td><td>${statusAr(o.status)}</td><td>${fmt(o.total)}</td><td>${escapeHtml(o.paymentMethod||'')}</td><td><button class="btn3" onclick="go('invoicePrint',{id:'${o.id}'})">عرض / طباعة</button></td></tr>`).join('');return pageShell('الفواتير','عرض وطباعة فواتير الطلبات من نفس المنصة.',`<div class="table-wrap"><table><tr><th>رقم الطلب</th><th>التاريخ</th><th>الحالة</th><th>الإجمالي</th><th>الدفع</th><th></th></tr>${rows||'<tr><td colspan="6" class="empty">لا توجد فواتير بعد.</td></tr>'}</table></div>`)}

    function settlementsCenterPage(){if(!['admin','vendor'].includes(role()))return loginRequired();const s=load();let rows=settlementRows(s);if(role()==='vendor')rows=rows.filter(r=>r.vendorId===uid());const table=rows.map(r=>`<tr><td>${escapeHtml(r.storeName)}</td><td>${r.orders}</td><td>${fmt(r.gross)}</td><td>${fmt(r.commission)}</td><td>${fmt(r.net)}</td><td>${fmt(r.settled)}</td><td><b>${fmt(r.due)}</b></td></tr>`).join('');const form=role()==='admin'?`<div class="card"><h3>تسجيل دفعة مورد</h3><form id="settlementForm" class="grid3"><div class="field"><label>المورد</label><select name="vendorId">${(s.vendors||[]).map(v=>`<option value="${v.userId}">${escapeHtml(v.storeName||v.userId)}</option>`).join('')}</select></div><div class="field"><label>المبلغ</label><input type="number" step="0.01" name="amount" required></div><div class="field"><label>المرجع</label><input name="reference" placeholder="رقم تحويل / سند"></div><button class="btn">حفظ الدفعة</button></form><div id="out" style="margin-top:12px"></div></div>`:'';return pageShell('تسويات الموردين','حساب صافي المورد والمدفوع والمتبقي.',`${form}<div class="section table-wrap"><table><tr><th>المورد</th><th>طلبات</th><th>إجمالي مبيعات</th><th>رسوم المنصة</th><th>صافي المورد</th><th>مدفوع</th><th>متبقي</th></tr>${table||'<tr><td colspan="7" class="empty">لا توجد تسويات بعد.</td></tr>'}</table></div>`)}

        const rf=$('#returnForm');if(rf){rf.onsubmit=e=>{e.preventDefault();const s=load(),f=Object.fromEntries(new FormData(rf));s.returns.push({id:id(),userId:uid(),userName:uname(),orderNo:f.orderNo,type:f.type,phone:f.phone,notes:f.notes,status:'new',createdAt:today()});fullAudit(s,'تسجيل مرتجع/شكوى','المرتجعات',f.orderNo);save(s);$('#out').innerHTML=notify('تم إرسال الطلب.');go('returns')}}

      },0)};
      window.deletePromotion=function(i){const s=load();s.promotions.splice(i,1);fullAudit(s,'حذف عرض','العروض','رقم '+(i+1));save(s);go('promotions')};
      window.closeReturn=function(rid){const s=load();const r=s.returns.find(x=>x.id===rid);if(r){r.status='closed';r.closedAt=today();fullAudit(s,'إغلاق مرتجع/شكوى','المرتجعات',r.orderNo);save(s)}go('returns')};

      function tierKey(t){return t==='retail'?'Retail':t==='bulk'?'Bulk':'Wholesale'}
      window.minQtyForTier=function(p,tier='wholesale'){
        const key='minQty'+tierKey(tier);
        const raw = p && (p[key] ?? p.minQty ?? 1);
        return Math.max(1,Number(raw||1));
      };
      window.tierMinimumsBlock=function(p){
        return `<div class="tier-min-row"><div class="tier-min-box"><span>حد قطاعي</span><b>${minQtyForTier(p,'retail').toLocaleString('ar-EG')} قطعة</b></div><div class="tier-min-box"><span>حد جملة</span><b>${minQtyForTier(p,'wholesale').toLocaleString('ar-EG')} قطعة</b></div><div class="tier-min-box"><span>حد جملة الجملة</span><b>${minQtyForTier(p,'bulk').toLocaleString('ar-EG')} قطعة</b></div></div>`;
      };
      function getProductZones(p){return Array.isArray(p?.zones)?p.zones:(Array.isArray(p?.coverageZones)?p.coverageZones:[])}

      window.productCoverageLabel = window.productCoverageLabel || function(p){
        const zones=getProductZones(p);
        if(!zones.length) return 'حسب تغطية المورد';
        return zones.map(z=>`${escapeHtml(z.governorate||'')}${z.district?' - '+escapeHtml(z.district):' - كل المراكز'}`).join('، ');
      };
      const productCoverageLabel = window.productCoverageLabel;
      function supplierProductCovers(s,vendorUserId,gov,dist,p){
        const pzones=getProductZones(p);
        if(pzones.length && !pzones.some(z=>zoneMatch(z,gov,dist))) return false;
        const v=(s.vendors||[]).find(x=>x.userId===vendorUserId || x.id===vendorUserId);
        const vzones=Array.isArray(v?.zones)?v.zones:[];
        return vzones.some(z=>zoneMatch(z,gov,dist));
      }

      productGrid=function(list){return `<div class="grid">${list.map(p=>`<div class="card product-card"><div class="thumb"><img src="${p.image||productImageForCategory(p.category)}" alt="${escapeHtml(p.name)}" onerror="this.src='tager-logo.png'"></div><h3>${escapeHtml(p.name)}</h3><p class="muted">${escapeHtml(p.category||'')}<br>التغطية: ${productCoverageLabel(p)}</p>${productPriceTiers(p)}<div class="product-actions"><button class="btn3" onclick="addCart('${p.id}','retail')">قطاعي</button><button class="btn" onclick="addCart('${p.id}','wholesale')">جملة</button><button class="btn2" onclick="addCart('${p.id}','bulk')">جملة الجملة</button></div></div>`).join('')}</div>`};

      zonesTable=function(arr){return arr.length?`<div class="coverage-map">${arr.map((z,i)=>`<div class="zone-card"><b>📍 ${escapeHtml(z.governorate||'')} - ${escapeHtml(z.district||'كل المراكز')}</b><p class="muted" style="margin:6px 0 0">${z.fee?`رسوم: ${fmt(z.fee)}<br>`:''}${z.sla?`مدة: ${escapeHtml(z.sla)}<br>`:''}${escapeHtml(z.notes||'')}</p><button class="btn-danger" style="margin-top:10px" onclick="removeVendorZone(${i})">حذف</button></div>`).join('')}</div>`:`<div class="empty">لم يتم إضافة أماكن توصيل بعد. أضف المحافظة والمركز قبل استقبال الطلبات.</div>`};

      productsTable=function(arr){return arr.length?`<div class="table-wrap"><table class="admin-price-table min-order-table"><tr><th>الصورة</th><th>المنتج</th><th>الفئة</th><th>الأسعار والحد الأدنى</th><th>المخزون</th><th>التغطية</th><th>الحالة</th></tr>${arr.map(p=>`<tr><td><img src="${p.image||productImageForCategory(p.category)}" onerror="this.src='tager-logo.png'" style="width:46px;height:46px;object-fit:contain;border-radius:12px;border:1px solid var(--line)"></td><td>${escapeHtml(p.name)}<small>${escapeHtml(p.unit||'قطعة')} ${p.leadTime?' | توريد: '+escapeHtml(p.leadTime):''}</small></td><td>${escapeHtml(p.category||'')}</td><td><b>قطاعي:</b> ${fmt(tierPrice(p,'retail'))}<small>حد أدنى ${minQtyForTier(p,'retail').toLocaleString('ar-EG')}</small><b>جملة:</b> ${fmt(tierPrice(p,'wholesale'))}<small>حد أدنى ${minQtyForTier(p,'wholesale').toLocaleString('ar-EG')}</small><b>جملة الجملة:</b> ${fmt(tierPrice(p,'bulk'))}<small>حد أدنى ${minQtyForTier(p,'bulk').toLocaleString('ar-EG')}</small></td><td>${Number(p.stock||0).toLocaleString('ar-EG')}<small>إعادة طلب: ${Number(p.reorderPoint||0).toLocaleString('ar-EG')}</small></td><td>${productCoverageLabel(p)}</td><td><span class="badge ${p.status}">${statusAr(p.status)}</span></td></tr>`).join('')}</table></div>`:`<div class="empty">لا توجد منتجات بعد.</div>`};
      adminProductsTable=function(s){return s.products.length?`<div class="table-wrap"><table class="admin-price-table min-order-table"><tr><th>الصورة</th><th>المنتج</th><th>المورد</th><th>الأسعار والحد الأدنى</th><th>التغطية</th><th>الحالة</th><th>إجراء</th></tr>${s.products.map(p=>{const v=(s.vendors||[]).find(x=>x.userId===p.vendorId);return `<tr><td><img src="${p.image||productImageForCategory(p.category)}" onerror="this.src='tager-logo.png'" style="width:46px;height:46px;object-fit:contain;border-radius:12px;border:1px solid var(--line)"></td><td>${escapeHtml(p.name)}<small>${escapeHtml(p.category||'')}</small></td><td>${escapeHtml(v?.storeName||'-')}</td><td><b>قطاعي:</b> ${fmt(tierPrice(p,'retail'))}<small>حد ${minQtyForTier(p,'retail').toLocaleString('ar-EG')}</small><b>جملة:</b> ${fmt(tierPrice(p,'wholesale'))}<small>حد ${minQtyForTier(p,'wholesale').toLocaleString('ar-EG')}</small><b>جملة الجملة:</b> ${fmt(tierPrice(p,'bulk'))}<small>حد ${minQtyForTier(p,'bulk').toLocaleString('ar-EG')}</small></td><td>${productCoverageLabel(p)}</td><td><span class="badge ${p.status}">${statusAr(p.status)}</span></td><td><button class="btn-ok" onclick="approveProduct('${p.id}')">اعتماد</button> <button class="btn-danger" onclick="rejectProduct('${p.id}')">رفض</button></td></tr>`}).join('')}</table></div>`:`<div class="empty">لا توجد منتجات مضافة.</div>`};

      supplierDetailsPage=function(data){const s=load();const v=s.vendors.find(x=>x.id===data.id); if(!v) return pageShell('صفحة المورد','',`<div class="empty">المورد غير موجود.</div>`); const prods=approvedProducts(s).filter(p=>p.vendorId===v.userId); return pageShell(v.storeName,'منتجات المورد ومناطق التوصيل التي يستطيع خدمتها.',`<div class="split"><div>${prods.length?productGrid(prods):'<div class="empty">لا توجد منتجات متاحة لهذا المورد حالياً.</div>'}</div><aside class="panel"><h3>بيانات المورد</h3><p class="muted">النشاط: ${escapeHtml(v.activity||'غير محدد')}<br>المحافظة: ${escapeHtml(v.governorate||'')}<br>المركز: ${escapeHtml(v.district||'')}</p><h3>أماكن التوصيل</h3>${zonesTable(v.zones||[])}</aside></div>`)};

      addCart=function(productId,tier='wholesale'){

m><div id="out" style="margin-top:12px"></div></div>`)};

      const __tierBindForms=bindForms;
      bindForms=function(page){__tierBindForms(page);setTimeout(()=>{
        const pf=$('#productForm'); if(pf){bindProductArea(pf); pf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(pf)); const file=pf.querySelector('[name=imageFile]')?.files?.[0]; const commit=(img)=>{const wholesale=Number(f.priceWholesale||0); const zones=(f.deliveryMode==='specific'&&f.productGovernorate)?[{governorate:f.productGovernorate,district:f.productDistrict||''}]:[]; s.products.push({id:id(),vendorId:uid(),name:f.name,category:f.category,unit:f.unit||'قطعة',description:f.description||'',price:wholesale,priceRetail:Number(f.priceRetail||0),priceWholesale:wholesale,priceBulk:Number(f.priceBulk||0),minQty:Number(f.minQtyWholesale||1),minQtyRetail:Number(f.minQtyRetail||1),minQtyWholesale:Number(f.minQtyWholesale||1),minQtyBulk:Number(f.minQtyBulk||1),stock:Number(f.stock||0),reorderPoint:Number(f.reorderPoint||0),leadTime:f.leadTime||'',deliveryMode:f.deliveryMode||'vendor',zones,image:img||f.image||productImageForCategory(f.category),status:'pending',createdAt:today()}); save(s); $('#out').innerHTML=notify('تم حفظ المنتج بالأسعار والحد الأدنى والتغطية بنجاح، وسيظهر بعد المراجعة.'); setTimeout(()=>go('vendor'),600)}; if(file){const reader=new FileReader(); reader.onload=()=>commit(reader.result); reader.onerror=()=>commit(f.image); reader.readAsDataURL(file)}else commit(f.image)}}
