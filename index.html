    function logout(){localStorage.removeItem('tager_user_id');localStorage.removeItem('tager_role');localStorage.removeItem('tager_name');go('home')}
    function app(){return $('#app')}
    function go(page, data={}){window.scrollTo({top:0,behavior:'smooth'});render(page,data);history.replaceState(null,'','#'+page)}
    window.addEventListener('hashchange',()=>render(location.hash.replace('#','')||'home'));
    function toggleMenu(){$('#navlinks').classList.toggle('open')}
    function navActive(page){$$('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===page))}
    function updateCartCount(){const s=load(); const n=(s.cart||[]).reduce((a,i)=>a+Number(i.qty||0),0); const el=$('#cartCount'); if(el) el.textContent=n}
    function notify(text,type='success'){return `<div class="${type}">${text}</div>`}
    function pageShell(title,sub,body){return `<section class="wrap page"><h1 class="page-title">${title}</h1>${sub?`<p class="sub-title">${sub}</p>`:''}${body}</section>`}
    function optionsGov(selected=''){return Object.keys(EGYPT).map(g=>`<option ${g===selected?'selected':''}>${g}</option>`).join('')}
    function optionsDistrict(gov,selected=''){return (EGYPT[gov]||[]).map(d=>`<option ${d===selected?'selected':''}>${d}</option>`).join('')}
    function bindArea(form){const g=form.querySelector('[name=governorate]'), d=form.querySelector('[name=district]'); if(!g||!d)return; const refresh=()=>{d.innerHTML=optionsDistrict(g.value,d.value)}; g.onchange=refresh; refresh()}
    function findVendorByUser(s,userId){return s.vendors.find(v=>v.userId===userId)}
    function approvedProducts(s){return s.products.filter(p=>p.status==='approved')}
    function approvedVendors(s){const approvedUsers=s.users.filter(u=>u.role==='vendor'&&u.status==='approved').map(u=>u.id);return s.vendors.filter(v=>approvedUsers.includes(v.userId))}
    function kpis(s){const sales=s.orders.reduce((a,o)=>a+Number(o.total||0),0); const paid=s.payments.filter(p=>p.status==='approved').reduce((a,p)=>a+Number(p.amount||0),0); const commission=s.orders.reduce((a,o)=>a+Number(o.commission||0),0); return {sales,paid,commission,orders:s.orders.length,products:s.products.length,vendors:s.vendors.length,users:s.users.length,approvedVendors:approvedVendors(s).length,approvedProducts:approvedProducts(s).length,areas:Object.values(EGYPT).flat().length,govs:Object.keys(EGYPT).length,cats:s.categories.length}}

    function home(){const s=load(), k=kpis(s); const av=approvedVendors(s), ap=approvedProducts(s); return `<section class="wrap page simple-home">
      <div class="simple-hero"><div><span class="kicker">منصة تاجر للتجارة بالجملة</span><h1><span>أسعار واضحة</span> لكل بند: قطاعي، جملة، وجملة الجملة</h1><p class="muted" style="font-size:19px">واجهة أبسط وأوضح للمشتري والمورد: ابحث، قارن الأسعار الثلاثة، أضف الصورة، وحدد الكمية والتغطية قبل إرسال الطلب.</p><div class="hero-actions"><button class="btn" onclick="go('products')">عرض المنتجات</button><button class="btn3" onclick="go('registerVendor')">إضافة مورد</button><button class="btn3" onclick="go('track')">تتبع طلب</button></div></div><div class="hero-art"><div class="globe"></div><div class="container-box"></div><div class="box-stack"></div><div class="forklift"></div><span class="pin p1"></span><span class="pin p2"></span><span class="pin p3"></span><div class="float-icon fi1">🏷️</div><div class="float-icon fi2">📷</div><div class="float-icon fi3">📦</div></div></div>
      <div class="quick-kpis"><div class="quick-kpi"><span>أنواع الأسعار</span><b>3</b><small class="muted">قطاعي / جملة / جملة الجملة</small></div><div class="quick-kpi"><span>فئات جاهزة</span><b>${k.cats}</b><small class="muted">مواد ومنتجات</small></div><div class="quick-kpi"><span>محافظات</span><b>${k.govs}</b><small class="muted">تغطية مصر</small></div><div class="quick-kpi"><span>مراكز</span><b>${k.areas}</b><small class="muted">اختيار التوصيل</small></div></div>
      <div class="searchbar"><select id="homeCat"><option value="">كل الفئات</option>${s.categories.filter(c=>c.active).map(c=>`<option>${c.name}</option>`).join('')}</select><input id="homeQ" placeholder="ابحث عن منتج أو مورد"><select id="homeGov"><option value="">كل المحافظات</option>${optionsGov()}</select><select id="homeType"><option value="products">منتجات</option><option value="suppliers">موردون</option></select><button class="btn2" onclick="quickSearch()">بحث</button></div>
      <div class="price-guide"><div class="card"><h3>سعر القطاعي</h3><p class="muted">للشراء بكميات صغيرة أو طلبات التجربة.</p></div><div class="card"><h3>سعر الجملة</h3><p class="muted">السعر الأساسي للمحلات والتجار.</p></div><div class="card"><h3>سعر جملة الجملة</h3><p class="muted">للكميات الكبيرة والموزعين.</p></div></div>
      <div class="simple-section"><div class="section-head"><div><h2>الفئات</h2><p class="muted">اختيار سريع للمواد والمنتجات.</p></div><button class="btn3" onclick="go('categories')">عرض الكل</button></div><div class="grid">${s.categories.slice(0,8).map(c=>`<div class="card category-card"><span class="icon">${c.icon}</span><div><h3>${c.name}</h3><p class="muted" style="margin:0">${c.description}</p></div></div>`).join('')}</div></div>
      <div class="simple-section"><div class="section-head"><div><h2>المنتجات</h2><p class="muted">كل منتج يظهر بصورة وثلاثة أسعار بعد اعتماد الإدارة.</p></div><button class="btn3" onclick="go('products')">عرض المنتجات</button></div>${ap.length?productGrid(ap):`<div class="empty">لا توجد منتجات معتمدة حالياً. أضف المنتج من لوحة المورد مع الصورة وأسعار القطاعي والجملة وجملة الجملة ثم اعتمده من الإدارة.</div>`}</div>
      <div class="simple-section"><div class="section-head"><div><h2>الموردون</h2><p class="muted">الموردون يظهرون بعد الاعتماد مع مناطق التغطية.</p></div><button class="btn3" onclick="go('suppliers')">عرض الموردين</button></div>${av.length?supplierGrid(av):`<div class="empty">لا يوجد موردون معتمدون حالياً. سجّل المورد واعتمده من لوحة الإدارة.</div>`}</div>
    </section>${howSection()}${footer()}`}

    function trustBand(){return `<section class="wrap band section"><div><b>تسوق بثقة</b><p class="muted">موردون ومنتجات بعد الاعتماد.</p></div><div><b>تغطية واضحة</b><p class="muted">المحافظة والمركز قبل الطلب.</p></div><div><b>دعم متواصل</b><p class="muted">بلاغات ومتابعة داخل المنصة.</p></div><div><b>رقابة مالية</b><p class="muted">إعدادات وعمولات داخل الإدارة فقط.</p></div></section>`}
    function howSection(){return `<section class="wrap section"><div class="section-head"><div><h2>كيف يعمل تاجر؟</h2><p class="muted">رحلة مختصرة من البحث إلى الاستلام.</p></div><button class="btn3" onclick="go('how')">التفاصيل</button></div><div class="journey"><div class="step"><span class="num">1</span><h3>ابحث</h3><p class="muted">ابحث عن منتج أو مورد.</p></div><div class="step"><span class="num">2</span><h3>قارن</h3><p class="muted">قارن السعر والتغطية.</p></div><div class="step"><span class="num">3</span><h3>اطلب</h3><p class="muted">أرسل الطلب بعد الفحص.</p></div><div class="step"><span class="num">4</span><h3>تابع</h3><p class="muted">تابع حالة الطلب.</p></div><div class="step"><span class="num">5</span><h3>استلم</h3><p class="muted">استلم وقيّم التجربة.</p></div></div></section>`}
    function footer(){const s=load(); return `<footer class="wrap footer"><div class="footer-grid"><div><img class="logo-plain" src="/tager-logo.png" alt="Tager"><p class="muted">منصة تجارة وتوريد تربط المشترين بالموردين وتدعم التشغيل والرقابة من مكان واحد.</p></div><div><h3>روابط مهمة</h3><p class="muted"><a href="#products" onclick="go('products')">المنتجات</a><br><a href="#categories" onclick="go('categories')">الفئات</a><br><a href="#suppliers" onclick="go('suppliers')">الموردون</a><br><a href="#coverage" onclick="go('coverage')">التغطية</a></p></div><div><h3>المساعدة</h3><p class="muted"><a href="#support" onclick="go('support')">الدعم</a><br><a href="#track" onclick="go('track')">تتبع الطلب</a><br><a href="#policies" onclick="go('policies')">السياسات</a></p></div><div><h3>التواصل</h3><p class="muted">واتساب: ${s.settings.whatsapp}<br>دعم: ${s.settings.supportPhone}<br>${s.settings.email}</p></div><div><h3>حمل التطبيق لاحقاً</h3><span class="app-badge">Google Play</span><span class="app-badge">App Store</span><p class="muted">واجهة جاهزة للتطوير كتطبيق لاحقاً.</p></div></div></footer>`}

    function quickSearch(){const type=$('#homeType').value, q=$('#homeQ').value.trim(), cat=$('#homeCat').value, gov=$('#homeGov').value; go(type,{q,cat,gov})}
    function productImageForCategory(cat=''){const c=String(cat||''); if(c.includes('مشروبات'))return 'product-water.svg'; if(c.includes('ألبان'))return 'product-milk.svg'; if(c.includes('منظفات'))return 'product-detergent.svg'; if(c.includes('ورقيات'))return 'product-tissue.svg'; if(c.includes('غذائية'))return 'product-rice.svg'; return 'tager-logo.png'}
    function tierPrice(p,tier='wholesale'){const retail=Number(p.priceRetail ?? p.retailPrice ?? p.price ?? 0); const wholesale=Number(p.priceWholesale ?? p.wholesalePrice ?? p.price ?? retail); const bulk=Number(p.priceBulk ?? p.bulkPrice ?? wholesale); if(tier==='retail')return retail||wholesale||bulk; if(tier==='bulk')return bulk||wholesale||retail; return wholesale||retail||bulk}
    function tierLabel(tier='wholesale'){return ({retail:'قطاعي',wholesale:'جملة',bulk:'جملة الجملة'})[tier]||'جملة'}
    function productPriceTiers(p){return `<div class="price-tiers"><div class="price-tier"><span>قطاعي</span><strong>${fmt(tierPrice(p,'retail'))}</strong></div><div class="price-tier main"><span>جملة</span><strong>${fmt(tierPrice(p,'wholesale'))}</strong></div><div class="price-tier"><span>جملة الجملة</span><strong>${fmt(tierPrice(p,'bulk'))}</strong></div></div>`}
    function supplierGrid(list){return `<div class="grid">${list.map(v=>`<div class="card supplier-card"><div class="thumb"><span style="font-size:52px">🏬</span></div><h3>${escapeHtml(v.storeName)}</h3><p class="muted">${escapeHtml(v.activity||'مورد معتمد')}<br>${escapeHtml(v.governorate||'')} ${v.district?' - '+escapeHtml(v.district):''}</p><p><span class="badge ok">معتمد</span></p><button class="btn3" onclick="go('supplierDetails',{id:'${v.id}'})">عرض المورد</button></div>`).join('')}</div>`}
    function productGrid(list){return `<div class="grid">${list.map(p=>`<div class="card product-card"><div class="thumb"><img src="${p.image||productImageForCategory(p.category)}" alt="${escapeHtml(p.name)}" onerror="this.src='tager-logo.png'"></div><h3>${escapeHtml(p.name)}</h3><p class="muted">${escapeHtml(p.category||'')}<br>الحد الأدنى: ${Number(p.minQty||1).toLocaleString('ar-EG')} قطعة</p>${productPriceTiers(p)}<div class="product-actions"><button class="btn3" onclick="addCart('${p.id}','retail')">قطاعي</button><button class="btn" onclick="addCart('${p.id}','wholesale')">جملة</button><button class="btn2" onclick="addCart('${p.id}','bulk')">جملة الجملة</button></div></div>`).join('')}</div>`}
    function escapeHtml(str=''){return String(str).replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[s]))}

    function productsPage(filter={}){const s=load();let arr=approvedProducts(s); if(filter.q) arr=arr.filter(p=>p.name.includes(filter.q)||String(p.category).includes(filter.q)); if(filter.cat) arr=arr.filter(p=>p.category===filter.cat); if(filter.sort==='price') arr=arr.sort((a,b)=>tierPrice(a,'wholesale')-tierPrice(b,'wholesale')); else arr=arr.sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),'ar')); const body=`<div class="searchbar" style="grid-template-columns:1fr 2fr 1fr auto"><select id="pCat"><option value="">كل الفئات</option>${s.categories.map(c=>`<option ${filter.cat===c.name?'selected':''}>${c.name}</option>`).join('')}</select><input id="pQ" value="${escapeHtml(filter.q||'')}" placeholder="بحث باسم المنتج"><select id="pSort"><option value="name" ${filter.sort!=='price'?'selected':''}>ترتيب بالاسم</option><option value="price" ${filter.sort==='price'?'selected':''}>ترتيب بسعر الجملة</option></select><button class="btn2" onclick="go('products',{q:$('#pQ').value,cat:$('#pCat').value,sort:$('#pSort').value})">بحث</button></div>${arr.length?productGrid(arr):`<div class="empty">لا توجد منتجات معتمدة حالياً. المنتج سيظهر هنا بصورة واضحة وثلاثة أسعار: قطاعي، جملة، وجملة الجملة.</div>`}<div class="section grid3"><div class="card"><h3>ثلاثة أسعار لكل بند</h3><p class="muted">قطاعي، جملة، وجملة الجملة داخل نفس كارت المنتج.</p></div><div class="card"><h3>صورة المنتج</h3><p class="muted">إضافة صورة من الجهاز أو رابط صورة لكل منتج.</p></div><div class="card"><h3>اعتماد إداري</h3><p class="muted">المنتج لا يظهر إلا بعد مراجعة الإدارة.</p></div></div>`; return pageShell('المنتجات','منتجات واضحة بصورة وسعر قطاعي وسعر جملة وسعر جملة الجملة لكل بند.',body)}
    function categoriesPage(){const s=load();return pageShell('الفئات','إدارة وعرض فئات المنصة مع الحفاظ على الألوان والهوية.',`<div class="grid">${s.categories.map(c=>`<div class="card category-card"><span class="icon">${c.icon}</span><div><h3>${escapeHtml(c.name)}</h3><p class="muted" style="margin:0">${escapeHtml(c.description)}</p><span class="badge ${c.active?'ok':'pending'}">${c.active?'نشطة':'موقوفة'}</span></div></div>`).join('')}</div>`) }
    function suppliersPage(filter={}){const s=load();let arr=approvedVendors(s); if(filter.q) arr=arr.filter(v=>v.storeName.includes(filter.q)||String(v.activity).includes(filter.q)); if(filter.gov) arr=arr.filter(v=>v.governorate===filter.gov); return pageShell('الموردون','قائمة الموردين المعتمدين، وتظهر فقط بعد اعتماد الإدارة.',`<div class="searchbar" style="grid-template-columns:1.5fr 1fr auto"><input id="sQ" value="${escapeHtml(filter.q||'')}" placeholder="بحث باسم المورد أو النشاط"><select id="sGov"><option value="">كل المحافظات</option>${optionsGov(filter.gov||'')}</select><button class="btn2" onclick="go('suppliers',{q:$('#sQ').value,gov:$('#sGov').value})">بحث</button></div>${arr.length?supplierGrid(arr):`<div class="empty">لا يوجد موردون معتمدون حالياً. سجّل المورد ثم اعتمده من لوحة الإدارة ليظهر هنا.</div>`}`)}
    function supplierDetailsPage(data){const s=load();const v=s.vendors.find(x=>x.id===data.id); if(!v) return pageShell('صفحة المورد','',`<div class="empty">المورد غير موجود.</div>`); const prods=approvedProducts(s).filter(p=>p.vendorId===v.userId); return pageShell(v.storeName,'صفحة مورد مستقلة تشمل النشاط والتغطية والمنتجات الخاصة به.',`<div class="split"><div>${prods.length?productGrid(prods):'<div class="empty">لا توجد منتجات معتمدة لهذا المورد حتى الآن.</div>'}</div><aside class="panel"><h3>بيانات المورد</h3><p class="muted">النشاط: ${escapeHtml(v.activity||'غير محدد')}<br>المحافظة: ${escapeHtml(v.governorate||'')}<br>المركز: ${escapeHtml(v.district||'')}<br>الحد الأدنى: ${fmt(v.minOrder||0)}</p><h3>مناطق التغطية</h3>${(v.zones||[]).length?`<div class="list">${v.zones.map(z=>`<div class="list-item"><span>${z.governorate} - ${z.district}</span><b>📍</b></div>`).join('')}</div>`:'<p class="muted">لم يتم إضافة مناطق تغطية بعد.</p>'}</aside></div>`)}
    function coveragePage(){return pageShell('مناطق التغطية','صفحة واضحة للمحافظات والمراكز، وتستخدم في فحص الطلب قبل الإرسال.',`<div class="grid">${Object.entries(EGYPT).map(([g,ds])=>`<div class="card"><h3>${g}</h3><p class="muted">${ds.join('، ')}</p><span class="badge">${ds.length} مراكز</span></div>`).join('')}</div>`)}
    function howPage(){return pageShell('كيف تعمل المنصة؟','شرح كامل لرحلة العميل والمورد والإدارة داخل تاجر.',`${howSection()}<div class="grid3 section"><div class="card"><h3>للعميل</h3><p class="muted">تسجيل، اختيار العنوان، البحث، إضافة للسلة، فحص التغطية، تأكيد الطلب، تتبع.</p></div><div class="card"><h3>للمورد</h3><p class="muted">إضافة المنتجات، تحديد التغطية، متابعة الطلبات، رفع الدفعات، مراجعة الحساب.</p></div><div class="card"><h3>للإدارة</h3><p class="muted">اعتماد الموردين والمنتجات، إعداد العمولات، متابعة الطلبات والدعم والتقارير.</p></div></div>`)}

    function loginPage(){return pageShell('تسجيل الدخول','ادخل برقم الهاتف وكلمة المرور بعد إنشاء الحساب.',`<div class="card auth-card"><form id="loginForm" class="grid2"><div class="field"><label>رقم الهاتف</label><input name="phone" required></div><div class="field"><label>كلمة المرور</label><input name="password" type="password" required></div><div class="copy-row"><button class="btn">دخول</button><button type="button" class="btn3" onclick="go('setup')">إعداد حساب الإدارة</button><button type="button" class="btn3" onclick="go('registerCustomer')">تسجيل عميل</button></div></form><div id="out" style="margin-top:12px"></div></div>`)}
    function setupPage(){const s=load(); const exists=s.users.some(u=>u.role==='admin'); return pageShell('إعداد حساب الإدارة','هذه الخطوة تنشئ حساب الإدارة الحقيقي داخل المتصفح بدون بيانات جاهزة مسبقاً.',exists?`<div class="success">تم إنشاء حساب الإدارة بالفعل. يمكنك تسجيل الدخول.</div><button class="btn" onclick="go('login')">تسجيل الدخول</button>`:`<div class="card auth-card"><form id="setupForm" class="grid2"><div class="field"><label>اسم المسؤول</label><input name="name" required></div><div class="field"><label>رقم الهاتف</label><input name="phone" required></div><div class="field"><label>البريد الإلكتروني</label><input name="email"></div><div class="field"><label>كلمة المرور</label><input name="password" type="password" required></div><button class="btn">إنشاء حساب الإدارة</button></form><div id="out" style="margin-top:12px"></div></div>`)}
    function registerPage(kind){const vendor=kind==='vendor';return pageShell(vendor?'تسجيل مورد':'تسجيل عميل',vendor?'بعد التسجيل يظهر المورد في لوحة الإدارة للاعتماد.':'تسجيل العميل لإرسال الطلبات وتتبعها.',`<div class="card auth-card"><form id="regForm" class="grid2"><div class="field"><label>${vendor?'اسم المسؤول':'اسم العميل'}</label><input name="name" required></div>${vendor?`<div class="field"><label>اسم المتجر / الشركة</label><input name="storeName" required></div><div class="field"><label>نوع النشاط</label><select name="activity">${CATEGORY_MASTER.map(c=>`<option>${c[0]}</option>`).join('')}</select></div>`:''}<div class="field"><label>رقم الهاتف</label><input name="phone" required></div><div class="field"><label>البريد الإلكتروني</label><input name="email"></div><div class="field"><label>كلمة المرور</label><input name="password" type="password" required></div><div class="field"><label>المحافظة</label><select name="governorate">${optionsGov()}</select></div><div class="field"><label>المركز</label><select name="district"></select></div><div class="field"><label>العنوان التفصيلي</label><input name="address"></div><button class="btn">تسجيل</button></form><div id="out" style="margin-top:12px"></div></div>`)}

    function customerPage(){if(role()!=='customer') return loginRequired(); const s=load(); const my=s.orders.filter(o=>o.customerId===uid()); return pageShell('لوحة العميل','متابعة الطلبات والعناوين والسلة والدعم.',`<div class="grid3"><div class="card"><h3>طلباتي</h3><div class="price">${my.length}</div></div><div class="card"><h3>إجمالي الطلبات</h3><div class="price">${fmt(my.reduce((a,o)=>a+Number(o.total||0),0))}</div></div><div class="card"><h3>السلة</h3><div class="price">${s.cart.length}</div></div></div><div class="tabs"><button class="tab active">الطلبات</button><button class="tab" onclick="go('products')">شراء جديد</button><button class="tab" onclick="go('support')">الدعم</button><button class="tab" onclick="logout()">خروج</button></div>${ordersTable(my)}`)}
    function vendorPage(){if(role()!=='vendor') return loginRequired(); const s=load(); const v=findVendorByUser(s,uid()); if(!v) return pageShell('لوحة المورد','',`<div class="empty">بيانات المورد غير موجودة.</div>`); const prods=s.products.filter(p=>p.vendorId===uid()); const ords=s.orders.filter(o=>o.items.some(i=>i.vendorId===uid())); const sales=ords.reduce((a,o)=>a+o.items.filter(i=>i.vendorId===uid()).reduce((x,i)=>x+i.price*i.qty,0),0); const comm=ords.reduce((a,o)=>a+o.items.filter(i=>i.vendorId===uid()).reduce((x,i)=>x+(i.price*i.qty*(Number(s.settings.defaultCommission)||0)/100),0),0); return pageShell('لوحة المورد','إدارة منتجاتك وتغطيتك وحسابك المالي.',`<div class="grid"><div class="card"><h3>المنتجات</h3><div class="price">${prods.length}</div></div><div class="card"><h3>الطلبات</h3><div class="price">${ords.length}</div></div><div class="card"><h3>المبيعات</h3><div class="price">${fmt(sales)}</div></div><div class="card"><h3>مستحقات المنصة</h3><div class="price">${fmt(comm)}</div></div></div><div class="tabs"><button class="tab active" onclick="showLocal('v-products')">المنتجات</button><button class="tab" onclick="showLocal('v-coverage')">التغطية</button><button class="tab" onclick="showLocal('v-orders')">الطلبات</button><button class="tab" onclick="showLocal('v-finance')">الحساب المالي</button><button class="tab" onclick="logout()">خروج</button></div><div id="v-products" class="local-tab">${productForm()}${productsTable(prods)}</div><div id="v-coverage" class="local-tab hidden">${zoneForm(v)}${zonesTable(v.zones||[])}</div><div id="v-orders" class="local-tab hidden">${ordersTable(ords)}</div><div id="v-finance" class="local-tab hidden"><div class="card"><h3>السياسة المالية</h3><p class="muted">نسبة العمولة ومصاريف السلة المميزة تظهر هنا للمورد كحساب مالي، ويتم تعديلها من الإدارة فقط.</p><div class="metric"><span>نسبة العمولة الحالية</span><strong>${s.settings.defaultCommission}%</strong></div><div class="metric"><span>رسوم السلة المميزة</span><strong>${s.settings.premiumBasketFee}%</strong></div></div></div><div id="out" style="margin-top:12px"></div>`)}
    function adminPage(){if(role()!=='admin') return loginRequired(); const s=load(), k=kpis(s); return pageShell('لوحة الإدارة','مركز إدارة كامل للمستخدمين والموردين والمنتجات والطلبات والمالية والإعدادات.',`<div class="grid"><div class="card"><h3>المستخدمون</h3><div class="price">${k.users}</div></div><div class="card"><h3>الموردون</h3><div class="price">${k.vendors}</div></div><div class="card"><h3>المنتجات</h3><div class="price">${k.products}</div></div><div class="card"><h3>الطلبات</h3><div class="price">${k.orders}</div></div></div><div class="tabs"><button class="tab active" onclick="showLocal('a-summary')">الملخص</button><button class="tab" onclick="showLocal('a-vendors')">الموردون</button><button class="tab" onclick="showLocal('a-products')">المنتجات</button><button class="tab" onclick="showLocal('a-orders')">الطلبات</button><button class="tab" onclick="showLocal('a-finance')">المالية</button><button class="tab" onclick="showLocal('a-settings')">الإعدادات</button><button class="tab" onclick="showLocal('a-data')">البيانات</button><button class="tab" onclick="logout()">خروج</button></div><div id="a-summary" class="local-tab"><div class="grid3"><div class="card"><h3>المبيعات</h3><div class="price">${fmt(k.sales)}</div></div><div class="card"><h3>عمولات مستحقة</h3><div class="price">${fmt(k.commission)}</div></div><div class="card"><h3>دفعات معتمدة</h3><div class="price">${fmt(k.paid)}</div></div></div><div class="section grid3"><div class="card"><h3>جاهزية الصفحات</h3><p class="muted">الرئيسية، المنتجات، الفئات، الموردون، التغطية، السلة، التتبع، الدعم، السياسات، لوحات الحسابات.</p></div><div class="card"><h3>نقاط الرقابة</h3><p class="muted">اعتماد المورد، اعتماد المنتج، فحص التغطية، إغلاق الطلب، مراجعة الدفع.</p></div><div class="card"><h3>مؤشرات التشغيل</h3><p class="muted">طلبات جديدة، قيد التجهيز، تم التسليم، مرتجعات، بلاغات دعم.</p></div></div></div><div id="a-vendors" class="local-tab hidden">${adminVendorsTable(s)}</div><div id="a-products" class="local-tab hidden">${adminProductsTable(s)}</div><div id="a-orders" class="local-tab hidden">${ordersTable(s.orders)}</div><div id="a-finance" class="local-tab hidden">${financeAdmin(s)}</div><div id="a-settings" class="local-tab hidden">${settingsForm(s)}</div><div id="a-data" class="local-tab hidden">${dataTools()}</div><div id="out" style="margin-top:12px"></div>`)}
    function loginRequired(){return pageShell('تسجيل الدخول مطلوب','',`<div class="empty">يجب تسجيل الدخول للوصول لهذه الصفحة.</div><button class="btn" onclick="go('login')">تسجيل الدخول</button>`)}
    function roleRoute(){const r=role(); if(r==='admin') return go('admin'); if(r==='vendor') return go('vendor'); if(r==='customer') return go('customer'); return go('login')}
    function showLocal(id){$$('.local-tab').forEach(x=>x.classList.add('hidden')); const el=document.getElementById(id); if(el) el.classList.remove('hidden'); $$('.tab').forEach(x=>x.classList.remove('active')); event?.target?.classList?.add('active')}

    function productForm(){const s=load();return `<div class="card"><h3>إضافة منتج</h3><form id="productForm" class="grid3"><div class="field"><label>اسم المنتج</label><input name="name" required></div><div class="field"><label>الفئة</label><select name="category">${s.categories.map(c=>`<option>${c.name}</option>`).join('')}</select></div><div class="field"><label>سعر القطاعي</label><input name="priceRetail" type="number" min="0" step="0.01" required></div><div class="field"><label>سعر الجملة</label><input name="priceWholesale" type="number" min="0" step="0.01" required></div><div class="field"><label>سعر جملة الجملة</label><input name="priceBulk" type="number" min="0" step="0.01" required></div><div class="field"><label>المخزون</label><input name="stock" type="number" min="0" value="0"></div><div class="field"><label>الحد الأدنى للطلب</label><input name="minQty" type="number" min="1" value="1"></div><div class="field"><label>صورة المنتج من الجهاز</label><input name="imageFile" type="file" accept="image/*"><div class="image-preview-note">يمكن تركها واستخدام رابط صورة.</div></div><div class="field"><label>رابط الصورة</label><input name="image" placeholder="اختياري"></div><button class="btn">حفظ المنتج</button></form></div>`}
    function zoneForm(v){return `<div class="card"><h3>إضافة منطقة تغطية</h3><form id="zoneForm" class="grid3"><div class="field"><label>المحافظة</label><select name="governorate">${optionsGov(v?.governorate||'')}</select></div><div class="field"><label>المركز</label><select name="district"></select></div><div class="field"><label>ملاحظات</label><input name="notes" placeholder="اختياري"></div><button class="btn">حفظ المنطقة</button></form></div>`}
    function productsTable(arr){return arr.length?`<div class="table-wrap"><table class="admin-price-table"><tr><th>الصورة</th><th>المنتج</th><th>الفئة</th><th>قطاعي</th><th>جملة</th><th>جملة الجملة</th><th>المخزون</th><th>الحالة</th></tr>${arr.map(p=>`<tr><td><img src="${p.image||productImageForCategory(p.category)}" onerror="this.src='tager-logo.png'" style="width:46px;height:46px;object-fit:contain;border-radius:12px;border:1px solid var(--line)"></td><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.category)}</td><td>${fmt(tierPrice(p,'retail'))}</td><td>${fmt(tierPrice(p,'wholesale'))}</td><td>${fmt(tierPrice(p,'bulk'))}</td><td>${p.stock}</td><td><span class="badge ${p.status}">${statusAr(p.status)}</span></td></tr>`).join('')}</table></div>`:`<div class="empty">لا توجد منتجات بعد.</div>`}
    function zonesTable(arr){return arr.length?`<div class="table-wrap"><table><tr><th>المحافظة</th><th>المركز</th><th>ملاحظات</th></tr>${arr.map(z=>`<tr><td>${z.governorate}</td><td>${z.district}</td><td>${escapeHtml(z.notes||'')}</td></tr>`).join('')}</table></div>`:`<div class="empty">لم يتم إضافة مناطق تغطية بعد.</div>`}
    function ordersTable(arr){return arr.length?`<div class="table-wrap"><table><tr><th>رقم الطلب</th><th>التاريخ</th><th>الإجمالي</th><th>الحالة</th><th>الدفع</th></tr>${arr.map(o=>`<tr><td>${o.orderNo}</td><td>${o.date}</td><td>${fmt(o.total)}</td><td><span class="badge ${o.status}">${statusAr(o.status)}</span></td><td>${o.paymentMethod}</td></tr>`).join('')}</table></div>`:`<div class="empty">لا توجد طلبات.</div>`}
    function statusAr(st){return ({pending:'قيد المراجعة',approved:'معتمد',rejected:'مرفوض',new:'جديد',processing:'قيد التجهيز',delivered:'تم التسليم',cancelled:'ملغي'})[st]||st||'جديد'}
    function adminVendorsTable(s){const arr=s.users.filter(u=>u.role==='vendor'); return arr.length?`<div class="table-wrap"><table><tr><th>المورد</th><th>الهاتف</th><th>الحالة</th><th>إجراء</th></tr>${arr.map(u=>`<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.phone)}</td><td><span class="badge ${u.status}">${statusAr(u.status)}</span></td><td><button class="btn-ok" onclick="approveUser('${u.id}')">اعتماد</button> <button class="btn-danger" onclick="rejectUser('${u.id}')">رفض</button></td></tr>`).join('')}</table></div>`:`<div class="empty">لا يوجد موردون مسجلون.</div>`}
    function adminProductsTable(s){return s.products.length?`<div class="table-wrap"><table class="admin-price-table"><tr><th>الصورة</th><th>المنتج</th><th>الفئة</th><th>قطاعي</th><th>جملة</th><th>جملة الجملة</th><th>الحالة</th><th>إجراء</th></tr>${s.products.map(p=>`<tr><td><img src="${p.image||productImageForCategory(p.category)}" onerror="this.src='tager-logo.png'" style="width:46px;height:46px;object-fit:contain;border-radius:12px;border:1px solid var(--line)"></td><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.category)}</td><td>${fmt(tierPrice(p,'retail'))}</td><td>${fmt(tierPrice(p,'wholesale'))}</td><td>${fmt(tierPrice(p,'bulk'))}</td><td><span class="badge ${p.status}">${statusAr(p.status)}</span></td><td><button class="btn-ok" onclick="approveProduct('${p.id}')">اعتماد</button> <button class="btn-danger" onclick="rejectProduct('${p.id}')">رفض</button></td></tr>`).join('')}</table></div>`:`<div class="empty">لا توجد منتجات مضافة.</div>`}
    function financeAdmin(s){const k=kpis(s); return `<div class="grid3"><div class="card"><h3>إجمالي المبيعات</h3><div class="price">${fmt(k.sales)}</div></div><div class="card"><h3>عمولة المنصة</h3><div class="price">${fmt(k.commission)}</div></div><div class="card"><h3>المدفوعات المعتمدة</h3><div class="price">${fmt(k.paid)}</div></div></div><div class="notice section">الإعدادات المالية داخل الإدارة فقط ولا تظهر كحقول إدارية في الصفحات العامة.</div>`}
    function settingsForm(s){return `<div class="card"><h3>إعدادات المنصة</h3><form id="settingsForm" class="settings-grid"><div class="field"><label>اسم المنصة</label><input name="platformName" value="${escapeHtml(s.settings.platformName)}"></div><div class="field"><label>رقم الدعم</label><input name="supportPhone" value="${escapeHtml(s.settings.supportPhone)}"></div><div class="field"><label>واتساب</label><input name="whatsapp" value="${escapeHtml(s.settings.whatsapp)}"></div><div class="field"><label>البريد</label><input name="email" value="${escapeHtml(s.settings.email)}"></div><div class="field"><label>عملة العرض</label><input name="currency" value="${escapeHtml(s.settings.currency)}"></div><div class="field"><label>عمولة المنصة %</label><input name="defaultCommission" type="number" step="0.01" value="${s.settings.defaultCommission}"></div><div class="field"><label>رسوم السلة المميزة %</label><input name="premiumBasketFee" type="number" step="0.01" value="${s.settings.premiumBasketFee}"></div><div class="field"><label>رسوم توصيل أساسية</label><input name="deliveryBase" type="number" step="0.01" value="${s.settings.deliveryBase}"></div><div class="field"><label>الحد الأدنى العام</label><input name="minOrder" type="number" step="0.01" value="${s.settings.minOrder}"></div><button class="btn">حفظ الإعدادات</button></form></div>`}
    function dataTools(){return `<div class="grid2"><div class="card"><h3>تصدير البيانات</h3><p class="muted">تحميل ملف JSON من بيانات التشغيل الحالية.</p><button class="btn" onclick="exportData()">تصدير JSON</button></div><div class="card"><h3>استيراد البيانات</h3><p class="muted">الصق بيانات JSON تم تصديرها من المنصة.</p><textarea id="importBox" placeholder="الصق JSON هنا"></textarea><button class="btn3" onclick="importData()">استيراد</button></div></div>`}

    function addCart(productId,tier='wholesale'){const s=load(), p=s.products.find(x=>x.id===productId); if(!p) return; const price=tierPrice(p,tier); const found=s.cart.find(i=>i.productId===productId&&i.tier===tier); if(found) found.qty+=1; else s.cart.push({productId:p.id,vendorId:p.vendorId,name:p.name,price,priceRetail:tierPrice(p,'retail'),priceWholesale:tierPrice(p,'wholesale'),priceBulk:tierPrice(p,'bulk'),tier,tierName:tierLabel(tier),qty:1}); save(s); alert('تمت الإضافة للسلة بسعر '+tierLabel(tier))}
    function cartPage(){const s=load(); const total=s.cart.reduce((a,i)=>a+i.price*i.qty,0); return pageShell('السلة','راجع الأصناف ونوع السعر قبل تأكيد الطلب.',`<div class="card">${s.cart.length?`<div class="table-wrap"><table><tr><th>الصنف</th><th>نوع السعر</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th><th></th></tr>${s.cart.map((i,idx)=>`<tr><td>${escapeHtml(i.name)}</td><td><span class="badge ok">${escapeHtml(i.tierName||tierLabel(i.tier))}</span></td><td><input type="number" min="1" value="${i.qty}" onchange="updateQty(${idx},this.value)" style="width:90px"></td><td>${fmt(i.price)}</td><td>${fmt(i.price*i.qty)}</td><td><button class="btn-danger" onclick="removeCart(${idx})">حذف</button></td></tr>`).join('')}</table></div><h2>الإجمالي: ${fmt(total)}</h2>`:'<div class="empty">السلة فارغة.</div>'}</div><div class="card section"><h3>بيانات التوصيل</h3><form id="checkoutForm" class="grid3"><div class="field"><label>المحافظة</label><select name="governorate">${optionsGov()}</select></div><div class="field"><label>المركز</label><select name="district"></select></div><div class="field"><label>العنوان التفصيلي</label><input name="address" required></div><div class="field"><label>طريقة الدفع</label><select name="paymentMethod"><option>نقدي عند الاستلام</option><option>تحويل بنكي</option><option>محفظة إلكترونية</option></select></div><div class="field"><label>نوع السلة</label><select name="cartType"><option value="normal">سلة عادية</option><option value="premium">سلة مميزة</option></select></div><button class="btn">تأكيد الطلب</button></form><div id="out" style="margin-top:12px"></div></div>`)}
    function updateQty(idx,val){const s=load(); if(s.cart[idx]) s.cart[idx].qty=Math.max(1,Number(val||1)); save(s); go('cart')}
    function removeCart(idx){const s=load(); s.cart.splice(idx,1); save(s); go('cart')}
    function trackPage(){return pageShell('تتبع الطلب','ادخل رقم الطلب ورقم الهاتف لمعرفة الحالة.',`<div class="card auth-card"><form id="trackForm" class="grid2"><div class="field"><label>رقم الطلب</label><input name="orderNo" placeholder="مثال: TG-1001" required></div><div class="field"><label>رقم الهاتف</label><input name="phone" required></div><button class="btn">بحث</button></form><div id="out" style="margin-top:12px"></div></div>`)}
    function supportPage(){const s=load();return pageShell('الدعم','أرسل طلب دعم أو تواصل مع فريق تاجر.',`<div class="split"><div class="card"><h3>فتح تذكرة دعم</h3><form id="supportForm" class="grid2"><div class="field"><label>الاسم</label><input name="name" required></div><div class="field"><label>الهاتف</label><input name="phone" required></div><div class="field"><label>نوع الطلب</label><select name="type"><option>مساعدة طلب</option><option>مشكلة مورد</option><option>مشكلة دفع</option><option>اقتراح تطوير</option></select></div><div class="field"><label>الأولوية</label><select name="priority"><option>عادية</option><option>مهمة</option><option>عاجلة</option></select></div><div class="field" style="grid-column:1/-1"><label>الرسالة</label><textarea name="message" required></textarea></div><button class="btn">إرسال</button></form><div id="out" style="margin-top:12px"></div></div><aside class="panel"><h3>بيانات التواصل</h3><p class="muted">دعم: ${s.settings.supportPhone}<br>واتساب: ${s.settings.whatsapp}<br>بريد: ${s.settings.email}</p><button class="btn3" onclick="location.href='https://wa.me/${String(s.settings.whatsapp).replace(/\D/g,'')}'">فتح واتساب</button></aside></div>`)}
    function policiesPage(){return pageShell('السياسات','الشروط العامة للتشغيل داخل المنصة.',`<div class="grid2"><div class="card"><h3>سياسة الموردين</h3><p class="content-block">يخضع المورد للاعتماد قبل ظهور بياناته. يجب إضافة مناطق التغطية والأسعار والحد الأدنى للطلب بشكل صحيح.</p></div><div class="card"><h3>سياسة المنتجات</h3><p class="content-block">لا تظهر المنتجات في السوق إلا بعد مراجعة الإدارة. يمكن إيقاف المنتج عند وجود بيانات غير مكتملة.</p></div><div class="card"><h3>سياسة الطلبات</h3><p class="content-block">يتم فحص تغطية المورد لموقع العميل قبل تأكيد الطلب لتقليل الأخطاء التشغيلية.</p></div><div class="card"><h3>السياسة المالية</h3><p class="content-block">العمولات ورسوم السلة والإعدادات المالية داخل الإدارة فقط وتظهر للمورد في حسابه المالي عند الحاجة.</p></div></div>`)}

    function bindForms(page){setTimeout(()=>{const lf=$('#loginForm'); if(lf) lf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(lf)); const u=s.users.find(u=>u.phone===f.phone&&u.password===f.password); const out=$('#out'); if(!u) return out.innerHTML=notify('بيانات الدخول غير صحيحة.','error'); if(u.status==='pending') return out.innerHTML=notify('الحساب في انتظار موافقة الإدارة.','error'); if(u.status==='rejected') return out.innerHTML=notify('تم رفض الحساب من الإدارة.','error'); setSession(u); roleRoute()};
      const sf=$('#setupForm'); if(sf) sf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(sf)); if(s.users.some(u=>u.role==='admin')) return $('#out').innerHTML=notify('حساب الإدارة موجود بالفعل.','error'); const u={id:id(),role:'admin',status:'approved',name:f.name,phone:f.phone,email:f.email,password:f.password,createdAt:today()}; s.users.push(u); save(s); $('#out').innerHTML=notify('تم إنشاء حساب الإدارة. يمكنك تسجيل الدخول الآن.');};
      const rf=$('#regForm'); if(rf) {bindArea(rf); rf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(rf)); const vendor=page==='registerVendor'; if(s.users.some(u=>u.phone===f.phone)) return $('#out').innerHTML=notify('رقم الهاتف مسجل بالفعل.','error'); const u={id:id(),role:vendor?'vendor':'customer',status:vendor?'pending':'approved',name:f.name,phone:f.phone,email:f.email,password:f.password,governorate:f.governorate,district:f.district,address:f.address,createdAt:today()}; s.users.push(u); if(vendor){s.vendors.push({id:id(),userId:u.id,storeName:f.storeName,activity:f.activity,governorate:f.governorate,district:f.district,address:f.address,minOrder:s.settings.minOrder||0,zones:[],createdAt:today()})} save(s); $('#out').innerHTML=notify(vendor?'تم تسجيل المورد. بانتظار اعتماد الإدارة.':'تم تسجيل العميل. يمكنك تسجيل الدخول الآن.'); rf.reset();};}
      const pf=$('#productForm'); if(pf){pf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(pf)); const file=pf.querySelector('[name=imageFile]')?.files?.[0]; const commit=(img)=>{const wholesale=Number(f.priceWholesale||0); s.products.push({id:id(),vendorId:uid(),name:f.name,category:f.category,price:wholesale,priceRetail:Number(f.priceRetail||0),priceWholesale:wholesale,priceBulk:Number(f.priceBulk||0),stock:Number(f.stock||0),minQty:Number(f.minQty||1),image:img||f.image||productImageForCategory(f.category),status:'pending',createdAt:today()}); save(s); $('#out').innerHTML=notify('تم حفظ المنتج بالصورة وثلاثة أسعار. في انتظار اعتماد الإدارة.'); setTimeout(()=>go('vendor'),500)}; if(file){const reader=new FileReader(); reader.onload=()=>commit(reader.result); reader.onerror=()=>commit(f.image); reader.readAsDataURL(file)}else commit(f.image)}}
      const zf=$('#zoneForm'); if(zf){bindArea(zf); zf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(zf)); const v=findVendorByUser(s,uid()); if(!v) return; v.zones=v.zones||[]; v.zones.push({governorate:f.governorate,district:f.district,notes:f.notes}); save(s); $('#out').innerHTML=notify('تمت إضافة منطقة التغطية.'); go('vendor')}}
      const cf=$('#checkoutForm'); if(cf){bindArea(cf); cf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(cf)); if(!uid()) return $('#out').innerHTML=notify('يجب تسجيل الدخول كعميل لإرسال الطلب.','error'); if(!s.cart.length) return $('#out').innerHTML=notify('السلة فارغة.','error'); const notCovered=[]; for(const item of s.cart){const v=s.vendors.find(v=>v.userId===item.vendorId); const ok=(v?.zones||[]).some(z=>z.governorate===f.governorate&&z.district===f.district); if(!ok) notCovered.push(item.name)} if(notCovered.length) return $('#out').innerHTML=notify('لا يمكن إرسال الطلب: بعض الموردين لا يغطون منطقة التوصيل المختارة.','error'); const subtotal=s.cart.reduce((a,i)=>a+i.price*i.qty,0); const extra=f.cartType==='premium'?subtotal*(Number(s.settings.premiumBasketFee||0)/100):0; const commission=subtotal*(Number(s.settings.defaultCommission||0)/100); const order={id:id(),orderNo:'TG-'+String(1000+s.orders.length+1),customerId:uid(),phone:(s.users.find(u=>u.id===uid())||{}).phone||'',date:today(),items:[...s.cart],governorate:f.governorate,district:f.district,address:f.address,paymentMethod:f.paymentMethod,cartType:f.cartType,total:subtotal+extra+Number(s.settings.deliveryBase||0),commission,status:'new'}; s.orders.push(order); s.cart=[]; save(s); $('#out').innerHTML=notify('تم إرسال الطلب بنجاح. رقم الطلب: '+order.orderNo);};}
      const tf=$('#trackForm'); if(tf){tf.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(tf)); const o=s.orders.find(o=>o.orderNo===f.orderNo&&String(o.phone||'')===String(f.phone||'')); $('#out').innerHTML=o?`<div class="success"><b>حالة الطلب:</b> ${statusAr(o.status)}<br><b>الإجمالي:</b> ${fmt(o.total)}<br><b>العنوان:</b> ${o.governorate} - ${o.district}</div>`:notify('لم يتم العثور على الطلب.','error')}}
      const support=$('#supportForm'); if(support){support.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(support)); s.tickets.push({id:id(),...f,status:'new',createdAt:today()}); save(s); $('#out').innerHTML=notify('تم إرسال طلب الدعم بنجاح.'); support.reset();}}
      const st=$('#settingsForm'); if(st){st.onsubmit=e=>{e.preventDefault(); const s=load(), f=Object.fromEntries(new FormData(st)); s.settings={...s.settings,...f,defaultCommission:Number(f.defaultCommission||0),premiumBasketFee:Number(f.premiumBasketFee||0),deliveryBase:Number(f.deliveryBase||0),minOrder:Number(f.minOrder||0)}; save(s); $('#out').innerHTML=notify('تم حفظ الإعدادات.');}}
    },0)}

    function approveUser(idv){const s=load(); const u=s.users.find(u=>u.id===idv); if(u)u.status='approved'; save(s); go('admin')}
    function rejectUser(idv){const s=load(); const u=s.users.find(u=>u.id===idv); if(u)u.status='rejected'; save(s); go('admin')}
    function approveProduct(idv){const s=load(); const p=s.products.find(p=>p.id===idv); if(p)p.status='approved'; save(s); go('admin')}
    function rejectProduct(idv){const s=load(); const p=s.products.find(p=>p.id===idv); if(p)p.status='rejected'; save(s); go('admin')}
    function exportData(){const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tager-data.json'; a.click(); URL.revokeObjectURL(a.href)}
    function importData(){try{const obj=JSON.parse($('#importBox').value); save({...blank(),...obj}); alert('تم الاستيراد'); go('admin')}catch(e){alert('صيغة JSON غير صحيحة')}}

    function render(page='home',data={}){if(!page) page='home'; navActive(page); updateCartCount(); let html=''; if(page==='home') html=home(); else if(page==='products') html=productsPage(data); else if(page==='categories') html=categoriesPage(); else if(page==='suppliers') html=suppliersPage(data); else if(page==='supplierDetails') html=supplierDetailsPage(data); else if(page==='coverage') html=coveragePage(); else if(page==='how') html=howPage(); else if(page==='login') html=loginPage(); else if(page==='setup') html=setupPage(); else if(page==='registerVendor') html=registerPage('vendor'); else if(page==='registerCustomer') html=registerPage('customer'); else if(page==='customer') html=customerPage(); else if(page==='vendor') html=vendorPage(); else if(page==='admin') html=adminPage(); else if(page==='cart') html=cartPage(); else if(page==='track') html=trackPage(); else if(page==='support') html=supportPage(); else if(page==='policies') html=policiesPage(); else html=home(); app().innerHTML=html; bindForms(page)}
    window.onerror=function(msg,src,line,col,err){app().innerHTML=pageShell('حدث خطأ في التحميل','',`<div class="error">${escapeHtml(String(msg||err||'خطأ غير معروف'))}</div><button class="btn" onclick="go('home')">العودة للرئيسية</button>`)};


    // Live system layer - keeps the same files and design while adding live monitoring and operational controls.
    const __baseHome = home;
    const __baseAdminPage = adminPage;
    const __baseVendorPage = vendorPage;
    const __baseCustomerPage = customerPage;
    const __baseOrdersTable = ordersTable;
    const __baseSave = save;
    function nowStamp(){return new Date().toLocaleString('ar-EG',{hour12:true})}
    function ensureLive(s){
      s.live = s.live || {enabled:true,lastSync:'',health:92};
      s.activityLog = Array.isArray(s.activityLog)?s.activityLog:[];
      return s;
    }
    save=function(s){
      ensureLive(s);
      s.live.lastSync = nowStamp();
      __baseSave(s);
    };
    function liveCounts(s){
      s=ensureLive(s);
      const lowStock=s.products.filter(p=>Number(p.stock||0)<=5).length;
      const pendingVendors=s.users.filter(u=>u.role==='vendor'&&u.status==='pending').length;
      const pendingProducts=s.products.filter(p=>p.status==='pending').length;
      const newOrders=s.orders.filter(o=>['new','processing'].includes(o.status||'new')).length;
      const openTickets=s.tickets.filter(t=>(t.status||'new')!=='closed').length;
      const delivered=s.orders.filter(o=>o.status==='delivered').length;
      const sales=s.orders.reduce((a,o)=>a+Number(o.total||0),0);
      const commission=s.orders.reduce((a,o)=>a+Number(o.commission||0),0);
      const readiness=calcReadiness(s);
      return {lowStock,pendingVendors,pendingProducts,newOrders,openTickets,delivered,sales,commission,readiness};
    }
    function calcReadiness(s){
      const checks=[
        true,
        !!s.settings.supportPhone,
        !!s.settings.whatsapp,
        !!s.settings.email,
        s.categories.length>0,
        Object.keys(EGYPT).length>=20,
        true,
        true,
        true,
        true
      ];
      return Math.round((checks.filter(Boolean).length/checks.length)*100);
    }
    function liveRibbon(){
      const s=load(), c=liveCounts(s);
      const sync=s.live?.lastSync||'جاهز للتشغيل';
      return `<div class="live-ribbon"><div><span class="live-pill"><span class="live-pulse"></span> النظام لايف وجاهز للنشر</span><p class="muted" style="margin:8px 0 0">تحديث تلقائي للعدادات والطلبات والاعتمادات داخل نفس التصميم ونفس الصفحة.</p></div><div class="copy-row"><span class="chip">آخر تحديث: ${sync}</span><span class="chip">جاهزية: ${c.readiness}%</span><span class="chip">تنبيهات مفتوحة: ${c.openTickets+c.pendingVendors+c.pendingProducts}</span></div></div>`
    }
    home=function(){return liveRibbon()+__baseHome()};
    function liveEvents(s){
      const ev=[];
      s.orders.slice().reverse().slice(0,8).forEach(o=>ev.push({type:'طلب',title:o.orderNo||'طلب جديد',meta:statusAr(o.status),time:o.date||'',icon:'🧾'}));
      s.users.filter(u=>u.role==='vendor'&&u.status==='pending').slice(-6).reverse().forEach(u=>ev.push({type:'اعتماد مورد',title:u.name||u.phone,meta:'بانتظار الإدارة',time:u.createdAt||'',icon:'🏬'}));
      s.products.filter(p=>p.status==='pending').slice(-6).reverse().forEach(p=>ev.push({type:'اعتماد منتج',title:p.name,meta:p.category, time:p.createdAt||'', icon:'📦'}));
      s.tickets.slice().reverse().slice(0,6).forEach(t=>ev.push({type:'دعم',title:t.type||'تذكرة دعم',meta:t.priority||'عادية',time:t.createdAt||'',icon:'🎧'}));
      if(!ev.length) ev.push({type:'جاهزية',title:'لا توجد أحداث حتى الآن',meta:'سيظهر هنا كل جديد مباشرة بعد التسجيل أو الطلب',time:nowStamp(),icon:'✅'});
      return ev.slice(0,14).map(e=>`<div class="feed-item"><span class="icon">${e.icon}</span><div><b>${escapeHtml(e.type)}</b><div>${escapeHtml(e.title)}</div><small class="muted">${escapeHtml(e.meta||'')}</small></div><span class="feed-time">${escapeHtml(e.time||'')}</span></div>`).join('');
    }
    function liveHealthCard(s){
      const c=liveCounts(s);
      return `<div class="card live-status-card"><h3>صحة النظام</h3><p class="muted">مؤشر تشغيل مباشر للصفحات والإعدادات والبيانات الأساسية.</p><div class="health-line" style="--w:${c.readiness}%"><span></span></div><div class="metric"><span>جاهزية الإطلاق</span><strong>${c.readiness}%</strong></div><div class="metric"><span>آخر مزامنة</span><strong style="font-size:15px">${s.live?.lastSync||'جاهز'}</strong></div><div class="metric"><span>حالة الواجهة</span><strong>مباشر</strong></div></div>`;
    }
    function statusButtons(o){
      if(role()!=='admin') return '';
      return `<div class="ops-actions"><button class="btn3" onclick="setOrderStatus('${o.id}','processing')">تجهيز</button><button class="btn-ok" onclick="setOrderStatus('${o.id}','delivered')">تسليم</button><button class="btn-danger" onclick="setOrderStatus('${o.id}','cancelled')">إلغاء</button></div>`;
    }
    ordersTable=function(arr){
      return arr.length?`<div class="table-wrap"><table><tr><th>رقم الطلب</th><th>التاريخ</th><th>الإجمالي</th><th>الحالة</th><th>الدفع</th><th>إجراء مباشر</th></tr>${arr.map(o=>`<tr><td>${o.orderNo}</td><td>${o.date}</td><td>${fmt(o.total)}</td><td><span class="badge ${o.status}">${statusAr(o.status)}</span></td><td>${o.paymentMethod}</td><td>${statusButtons(o)}</td></tr>`).join('')}</table></div>`:`<div class="empty">لا توجد طلبات.</div>`
    };
    function setOrderStatus(orderId,status){
      const s=load(); const o=s.orders.find(x=>x.id===orderId); if(o){o.status=status;o.updatedAt=nowStamp();save(s);go(role()==='admin'?'admin':role()==='vendor'?'vendor':'customer')}
    }
    function closeTicket(ticketId){const s=load(); const t=s.tickets.find(x=>x.id===ticketId); if(t){t.status='closed';t.closedAt=nowStamp();save(s);go('live')}}
    function liveApprovals(s){
      const vendors=s.users.filter(u=>u.role==='vendor'&&u.status==='pending');
      const products=s.products.filter(p=>p.status==='pending');
      const tickets=s.tickets.filter(t=>(t.status||'new')!=='closed');
      return `<div class="grid3"><div class="card"><h3>موردون بانتظار الاعتماد</h3>${vendors.length?vendors.map(u=>`<div class="list-item"><span>${escapeHtml(u.name||u.phone)}</span><span class="ops-actions"><button class="btn-ok" onclick="approveUser('${u.id}')">اعتماد</button><button class="btn-danger" onclick="rejectUser('${u.id}')">رفض</button></span></div>`).join(''):'<div class="empty">لا توجد طلبات اعتماد موردين.</div>'}</div><div class="card"><h3>منتجات بانتظار الاعتماد</h3>${products.length?products.map(p=>`<div class="list-item"><span>${escapeHtml(p.name)}</span><span class="ops-actions"><button class="btn-ok" onclick="approveProduct('${p.id}')">اعتماد</button><button class="btn-danger" onclick="rejectProduct('${p.id}')">رفض</button></span></div>`).join(''):'<div class="empty">لا توجد منتجات معلقة.</div>'}</div><div class="card"><h3>تذاكر دعم مفتوحة</h3>${tickets.length?tickets.map(t=>`<div class="list-item"><span>${escapeHtml(t.type||'دعم')} - ${escapeHtml(t.name||'')}</span><span class="ops-actions"><button class="btn3" onclick="closeTicket('${t.id}')">إغلاق</button></span></div>`).join(''):'<div class="empty">لا توجد تذاكر مفتوحة.</div>'}</div></div>`
    }
    function livePage(){
      const s=load(), c=liveCounts(s);
      return pageShell('النظام لايف','مراقبة مباشرة للطلبات والاعتمادات والدعم والجاهزية مع الحفاظ على نفس التصميم والملفات.',`${liveRibbon()}<div class="live-kpi-grid"><div class="card"><h3>طلبات نشطة</h3><div class="price">${c.newOrders}</div><p class="muted">جديد أو قيد التجهيز</p></div><div class="card"><h3>اعتمادات معلقة</h3><div class="price">${c.pendingVendors+c.pendingProducts}</div><p class="muted">موردين ومنتجات</p></div><div class="card"><h3>تذاكر مفتوحة</h3><div class="price">${c.openTickets}</div><p class="muted">الدعم والمتابعة</p></div><div class="card"><h3>مخزون منخفض</h3><div class="price">${c.lowStock}</div><p class="muted">منتجات تحتاج مراجعة</p></div></div><div class="section live-board"><div class="card"><div class="section-head"><div><h2>الأحداث المباشرة</h2><p class="muted">كل إجراء جديد يظهر هنا من نفس بيانات المنصة.</p></div><button class="btn3" onclick="go('live')">تحديث</button></div><div class="live-feed">${liveEvents(s)}</div></div>${liveHealthCard(s)}</div><div class="section"><div class="section-head"><div><h2>مركز الاعتمادات المباشر</h2><p class="muted">اعتماد الموردين والمنتجات وإغلاق التذاكر من شاشة واحدة.</p></div></div>${role()==='admin'?liveApprovals(s):'<div class="empty">هذه الإجراءات متاحة لحساب الإدارة فقط. سجل الدخول كإدارة لفتح الاعتمادات المباشرة.</div>'}</div><div class="section"><div class="section-head"><div><h2>الطلبات المباشرة</h2><p class="muted">تغيير حالة الطلب فوراً من لوحة التشغيل.</p></div></div>${ordersTable(s.orders)}</div><div class="section command-strip"><span class="chip">الرئيسية جاهزة</span><span class="chip">المنتجات جاهزة</span><span class="chip">الموردون جاهزون</span><span class="chip">السلة جاهزة</span><span class="chip">الدعم جاهز</span><span class="chip">Vercel جاهز</span></div>`)
    }
    adminPage=function(){
      const base=__baseAdminPage();
      const s=load(), c=liveCounts(s);
      const livePanel=`<div class="section"><div class="section-head"><div><h2>مركز لايف سريع</h2><p class="muted">متابعة فورية للأحداث المهمة قبل الدخول للتفاصيل.</p></div><button class="btn" onclick="go('live')">فتح النظام لايف</button></div><div class="live-kpi-grid"><div class="card"><h3>طلبات نشطة</h3><div class="price">${c.newOrders}</div></div><div class="card"><h3>اعتمادات</h3><div class="price">${c.pendingVendors+c.pendingProducts}</div></div><div class="card"><h3>دعم مفتوح</h3><div class="price">${c.openTickets}</div></div><div class="card"><h3>جاهزية</h3><div class="price">${c.readiness}%</div></div></div></div>`;
      return base.replace('<div id="a-summary" class="local-tab">','<div id="a-summary" class="local-tab">'+livePanel);
    };
    vendorPage=function(){
      const base=__baseVendorPage();
      if(role()!=='vendor') return base;
      const s=load(); const myOrders=s.orders.filter(o=>o.items.some(i=>i.vendorId===uid()));
      const active=myOrders.filter(o=>['new','processing'].includes(o.status||'new')).length;
      return liveRibbon()+base.replace('<div class="grid">',`<div class="grid"><div class="card"><h3>طلبات مباشرة</h3><div class="price">${active}</div><p class="muted">جديد أو قيد التجهيز</p></div>`);
    };
    customerPage=function(){
      const base=__baseCustomerPage();
      if(role()!=='customer') return base;
      return liveRibbon()+base;
    };
    const __baseRender = render;
    render=function(page='home',data={}){
      if(page==='live'){
        navActive(page); updateCartCount(); app().innerHTML=livePage(); bindForms(page); return;
      }
      __baseRender(page,data);
    };
    window.addEventListener('online',()=>{const s=load();ensureLive(s);s.live.lastSync='متصل - '+nowStamp();save(s);});
    window.addEventListener('offline',()=>{const s=load();ensureLive(s);s.live.lastSync='غير متصل - '+nowStamp();save(s);});
    setInterval(()=>{
      const hash=location.hash.replace('#','')||'home';
      if(['live','admin'].includes(hash)){try{render(hash)}catch(e){}}
    },30000);

    render(location.hash.replace('#','')||'home');
  </script>
</body>
</html>
